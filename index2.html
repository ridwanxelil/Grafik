<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grafik Şablon 2025</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@400;600;700;800&family=Lato:wght@300;400;700&family=Oswald:wght@400;600;700&family=Raleway:wght@400;600;700&family=Poppins:wght@300;400;600;700&family=Source+Sans+3:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Ubuntu:wght@300;400;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@300;400;700&family=PT+Sans:wght@400;700&family=Noto+Sans:wght@300;400;700&family=Roboto+Condensed:wght@300;400;700&family=Roboto+Slab:wght@300;400;700&family=Fira+Sans:wght@300;400;600;700&family=Barlow:wght@300;400;600;700&family=DM+Sans:wght@300;400;600;700&family=Manrope:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&family=Lexend:wght@300;400;600;700&family=Lora:wght@400;600;700&family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════ */
:root {
  --nav-h: 68px;
  --panel-h: 52vh;
  --accent: #60a5fa;
  --bg: #080e1c;
  --surface: #0f172a;
  --surface2: #1e293b;
  --border: #1e293b;
  --border2: #334155;
  --text: #e2e8f0;
  --muted: #64748b;
  --panel-transition: .32s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #03070f; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }

/* ═══════════════════════════════════
   APP SHELL
═══════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  max-width: 768px;
  margin: 0 auto;
  box-shadow: 0 0 60px rgba(0,0,0,.8);
}

/* ═══════════════════════════════════
   CANVAS ZONE
═══════════════════════════════════ */
#canvasZone {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px;
  overflow: hidden;
  position: relative;
  container-type: size;
  container-name: canvas-zone;
}
#canvasInner {
  width: 100%;
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  container-type: size;
  container-name: canvas-inner;
}
.bg-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}
.bg-aspect {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}
/* ── PHOTO TOOLBAR: bg-frame içinde, kart altına yapışık ── */
#photoToolbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 1px;
  background: rgba(7,12,24,.92);
  backdrop-filter: blur(8px);
  border-top: 1px solid rgba(255,255,255,.07);
  padding: 0 6px;
}
.ptb-btn {
  width: 38px; height: 44px;
  border: none; border-radius: 7px;
  background: transparent; color: #64748b;
  font-size: 12px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
  transition: background .15s, color .15s; flex-shrink: 0;
}
.ptb-btn i { font-size: 13px; line-height: 1; }
.ptb-btn span { font-size: 7.5px; font-weight: 600; letter-spacing: .02em; line-height: 1; white-space: nowrap; }
.ptb-btn:hover  { background: #1e293b; color: #cbd5e1; }
.ptb-btn.active { background: rgba(99,102,241,.25); color: #a5b4fc; }
.ptb-sep { width: 1px; height: 24px; background: #1e293b; margin: 0 2px; flex-shrink: 0; }
.ptb-grow { flex: 1; }
.ptb-dl {
  width: 42px !important;
  color: #4ade80 !important; background: rgba(34,197,94,.08) !important;
  border: 1px solid rgba(34,197,94,.2) !important; border-radius: 8px !important;
}
.ptb-dl:hover { background: rgba(34,197,94,.18) !important; color: #86efac !important; }

.bg-wrap { width: 100%; display: flex; align-items: center; justify-content: center; }


.bg-frame {
  /* Kesinlikle 16/9 oran — genişlik ve yükseklik konteyner bazlı */
  aspect-ratio: 16 / 9;
  width: min(100cqw, calc(100cqh * 16 / 9));
  height: auto;
  flex-shrink: 0;
  border-radius: 14px; overflow: hidden;
  position: relative;
  background: radial-gradient(ellipse at 30% 40%, #1e3a5f 0%, #0b1728 55%, #070d1a 100%);
  box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 24px 60px rgba(0,0,0,.8);
  display: flex; align-items: center; justify-content: center;
  /* Kart marjini: sağ %15, sol %15, üst %15, alt %25 */
  padding: 8.4375% 15% 14.0625% 15%;
  transition: padding .25s;
}
#bgImgLayer {
  position: absolute; inset: 0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  pointer-events: none;
}
.bg-frame::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.4) 100%);
}
.card-wrap { position: relative; z-index: 1; width: 100%; }
.card-aspect { position: relative; width: 100%; padding-top: 56.25%; transition: padding-top .3s; }

/* ── CARD ── */
.card-inner {
  position: absolute; inset: 0;
  display: flex; border-radius: 14px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.7);
}
.card-inner.photo-right  { flex-direction: row-reverse; }
.card-inner.photo-top    { flex-direction: column; }
.card-inner.photo-bottom { flex-direction: column-reverse; }
.card-inner.photo-top    .photo-panel,
.card-inner.photo-bottom .photo-panel { width: 100%; height: 55%; }
.card-inner.photo-top    .content-panel,
.card-inner.photo-bottom .content-panel { height: 45%; }

.photo-panel {
  position: relative; width: 42%; flex-shrink: 0; overflow: hidden;
  background: #1a1a2e; cursor: grab; user-select: none; transition: width .3s;
}
.photo-panel.grabbing { cursor: grabbing; }
#photoImg { position: absolute; transform-origin: 0 0; display: none; pointer-events: none; will-change: transform; }
#photoTint { position: absolute; inset: 0; pointer-events: none; z-index: 2; opacity: 0; }

.photo-overlay {
  position: absolute; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  transition: background .2s, opacity .2s; pointer-events: none;
}
.photo-panel.empty    .photo-overlay { background: rgba(0,0,0,.5); opacity: 1; }
.photo-panel.has-img  .photo-overlay { opacity: 0; }
.photo-panel.has-img:hover .photo-overlay { background: rgba(0,0,0,.35); opacity: 1; }
.photo-panel.drag-over .photo-overlay { background: rgba(0,0,0,.6); opacity: 1; }
.photo-panel.drag-over { outline: 2px dashed rgba(255,255,255,.6); outline-offset: -3px; }
.ov-label { color: #fff; font-size: clamp(8px,.9vw,11px); font-weight: 600; text-align: center; line-height: 1.6; }

.photo-controls { display: none !important; }
.photo-panel.empty     .photo-controls { opacity: .9; pointer-events: all; }
.photo-panel.has-img   .photo-controls { opacity: 1; pointer-events: all; }
.pc-btn {
  width: 30px; height: 30px; border: none; border-radius: 6px;
  background: rgba(0,0,0,.65); color: #fff; font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px); transition: background .15s;
}
.pc-btn:hover { background: rgba(0,0,0,.88); }
.pc-btn.active { background: rgba(56,139,253,.5); color: #7dd3fc; }
.pc-sep { height: 1px; background: rgba(255,255,255,.15); margin: 1px 3px; }
.pc-camera { background: rgba(96,165,250,.22); color: #93c5fd; border: 1px solid rgba(96,165,250,.3); }

.content-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
/* Quote bölgesi: üst alan, esnek büyür */
.quote-area {
  flex: 1;
  min-height: 0;
  padding: clamp(4px, 0.8vw, 12px) clamp(4px, 0.8vw, 12px) clamp(2px, 0.4vw, 5px);
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}
.content-panel.namebar-top  .quote-area { order: 2; }
.content-panel.namebar-bottom .quote-area { order: 1; }

#quoteText {
  color: #fff; line-height: 1.65; font-weight: 400;
  outline: none; width: 100%;
  text-shadow: 0 1px 3px rgba(0,0,0,.2);
  cursor: text; white-space: pre-wrap; word-break: break-word;
  overflow: hidden;
  position: relative; z-index: 1;
}
#quoteText:empty::before { content: attr(data-ph); color: rgba(255,255,255,.45); font-style: italic; pointer-events: none; font-size: 15px; font-weight: 400; }

.quote-bg {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
}

/* Ad/Ünvan bölgesi: alt alan, sabit */
.name-bar-wrap {
  flex-shrink: 0;
  display: flex;
  z-index: 3;
  transition: all .25s;
  position: relative;
}
.content-panel.namebar-top    .name-bar-wrap { order: 1; }
.content-panel.namebar-bottom .name-bar-wrap { order: 2; }

/* Konum: left/right/center hizalaması */
.name-bar-wrap.pos-bottom-left,
.name-bar-wrap.pos-top-left   { justify-content: flex-start; }
.name-bar-wrap.pos-bottom-right,
.name-bar-wrap.pos-top-right  { justify-content: flex-end; }

.name-bar {
  padding: clamp(4px,.5vw,7px) clamp(10px,1.4vw,20px) clamp(3px,.4vw,5px);
  min-width: 44%; max-width: 100%; width: fit-content;
  position: relative; background: transparent !important;
  transition: border-radius .2s;
  display: flex; flex-direction: column; gap: 1px;
}
/* namebar-bottom'da bar alanı üstte görünür (order:2), köşe üst */
.content-panel.namebar-bottom .name-bar-wrap.pos-bottom-left  .name-bar { border-radius: 0 var(--bar-r,26px) 0 0; }
.content-panel.namebar-bottom .name-bar-wrap.pos-bottom-right .name-bar { border-radius: var(--bar-r,26px) 0 0 0; }
/* namebar-top'da bar alanı üstte (order:1), köşe alt */
.content-panel.namebar-top    .name-bar-wrap.pos-top-left     .name-bar { border-radius: 0 0 var(--bar-r,26px) 0; }
.content-panel.namebar-top    .name-bar-wrap.pos-top-right    .name-bar { border-radius: 0 0 0 var(--bar-r,26px); }

.bar-bg { position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 0; }

#nameField, #titleField { position: relative; z-index: 1; }
#nameField {
  color: #fff; font-weight: 800; letter-spacing: 0; text-transform: none;
  outline: none; display: block; cursor: text; white-space: normal; word-break: break-word;
  line-height: 1.15;
}
#nameField:empty::before { content: attr(data-ph); color: rgba(255,255,255,.35); font-style: italic; pointer-events: none; font-size: 15px; font-weight: 400; letter-spacing: 0; text-transform: none; }
#titleField {
  color: rgba(255,255,255,.85); font-weight: 400; letter-spacing: .03em;
  outline: none; display: block; margin-top: 0; cursor: text; white-space: normal; word-break: break-word;
  line-height: 1.15;
}
#titleField:empty::before { content: attr(data-ph); color: rgba(255,255,255,.3); font-style: italic; pointer-events: none; font-size: 15px; font-weight: 400; }
#nameField:focus, #titleField:focus { background: rgba(255,255,255,.07); border-radius: 3px; }

/* ═══════════════════════════════════
   HELP OVERLAY (inside canvas zone)
═══════════════════════════════════ */
#helpOverlay {
  display: none; position: absolute; inset: 0; z-index: 200;
  background: #080f1e; flex-direction: column;
  animation: hIn .22s ease;
}
#helpOverlay.on { display: flex; }
@keyframes hIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
.ho-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: #0d1526; border-bottom: 1px solid #1e293b; flex-shrink: 0;
}
.ho-topbar h4 { font-size: 13px; font-weight: 800; color: #e2e8f0; margin: 0; flex: 1; }
.ho-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: #1e293b; color: #64748b; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.ho-close:hover { background: #334155; color: #e2e8f0; }
.ho-body { flex: 1; overflow-y: auto; padding: 16px 18px 24px; display: flex; flex-direction: column; gap: 12px; }

/* ═══════════════════════════════════
   PANEL DRAWER
═══════════════════════════════════ */
#panelDrawer {
  flex-shrink: 0;
  height: 0;
  overflow: hidden;
  background: var(--surface);
  border-top: 1px solid var(--border);
  transition: height var(--panel-transition);
  display: flex;
  flex-direction: column;
}
#panelDrawer.open {
  height: var(--panel-h);
}

.pd-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: #0a1020;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.pd-header-icon {
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.pd-header h5 { font-size: 12px; font-weight: 700; color: var(--text); margin: 0; flex: 1; }
.pd-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: var(--surface2); color: var(--muted); font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.pd-close:hover { background: #334155; color: var(--text); }

.pd-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 8px 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.pd-body::-webkit-scrollbar { width: 3px; }
.pd-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

/* ═══════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════ */
#bottomNav {
  height: var(--nav-h);
  flex-shrink: 0;
  background: #070c18;
  border-top: 1px solid #111827;
  display: flex;
  align-items: stretch;
  box-shadow: 0 -4px 20px rgba(0,0,0,.5);
  z-index: 100;
}
.bn-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; border: none; background: transparent;
  color: rgba(255,255,255,.3);
  font-size: 8px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  cursor: pointer;
  transition: color .15s, background .15s;
  padding: 8px 2px 10px;
  position: relative;
}
.bn-btn i { font-size: 18px; transition: transform .2s; }
.bn-btn.active {
  color: var(--accent);
  background: rgba(96,165,250,.07);
}
.bn-btn.active::before {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent);
  border-radius: 0 0 3px 3px;
}
.bn-btn.active i { transform: translateY(-1px); }
.bn-btn:active { background: rgba(255,255,255,.05); }
.bn-btn.bn-dl { color: #22c55e; }
.bn-btn.bn-dl.active { color: #22c55e; background: rgba(34,197,94,.07); }
.bn-btn.bn-dl.active::before { background: #22c55e; }

/* ═══════════════════════════════════
   PANEL CONTENT COMPONENTS
═══════════════════════════════════ */
.sb-card {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; overflow: hidden; flex-shrink: 0;
}
.sb-card-head {
  padding: 6px 11px; background: #172033;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 6px;
}
.sb-card-head small {
  font-size: 8.5px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
}
.sb-card-head small i { color: var(--accent); }
.sb-card-body { padding: 5px 8px; display: flex; flex-direction: column; gap: 4px; }

.row { display: flex; align-items: center; gap: 4px; margin: 0; flex-wrap: nowrap; overflow: hidden; }
.lbl { font-size: 9.5px; font-weight: 600; color: var(--muted); white-space: nowrap; width: 54px; flex-shrink: 0; }
.val { font-size: 9.5px; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
.flex-fill { flex: 1 1 0; min-width: 0; }
.sb-hr { height: 1px; background: var(--border2); margin: 2px 0; }

.lg { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.lb {
  padding: 7px 4px; border: 1px solid var(--border2); border-radius: 7px;
  background: #0f172a; color: var(--muted);
  font-size: 9px; cursor: pointer; text-align: center;
  transition: background .15s, border-color .15s, color .15s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.lb i { font-size: 15px; }
.lb.active, .lb:hover { background: rgba(99,102,241,.2); border-color: #6366f1; color: #a5b4fc; }

.nb {
  padding: 6px 4px; border: 1px solid var(--border2); border-radius: 7px;
  background: #0f172a; color: var(--muted);
  font-size: 9px; cursor: pointer; text-align: center;
  transition: background .15s, border-color .15s, color .15s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.nb i { font-size: 13px; }
.nb.active, .nb:hover { background: rgba(99,102,241,.2); border-color: #6366f1; color: #a5b4fc; }

.ibg { display: flex; gap: 3px; }
.ib {
  width: 28px; height: 28px; border: 1px solid var(--border2); border-radius: 5px;
  background: #0f172a; color: var(--muted); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s;
}
.ib.active, .ib:hover { background: rgba(99,102,241,.2); color: #a5b4fc; border-color: #6366f1; }
.wb {
  padding: 3px 8px; border: 1px solid var(--border2); border-radius: 5px;
  background: #0f172a; color: var(--muted); font-size: 10px; cursor: pointer; transition: background .15s, color .15s;
}
.wb.active, .wb:hover { background: rgba(99,102,241,.2); color: #a5b4fc; border-color: #6366f1; }

/* form controls */
select, input[type=number], input[type=text] {
  min-width: 0; max-width: 100%;
  background: #0f172a !important; border: 1px solid var(--border2) !important;
  color: var(--text) !important; font-size: 11.5px;
  border-radius: 6px !important; padding: 4px 7px !important;
}
select:focus, input[type=number]:focus, input[type=text]:focus {
  box-shadow: 0 0 0 2px rgba(99,102,241,.25) !important;
  border-color: #6366f1 !important; outline: none;
}
select option { background: #1e293b; }
input[type=range] { accent-color: #6366f1; cursor: pointer; min-width: 0; flex: 1 1 0; display: block; }
input[type=color] {
  width: 28px; height: 26px; border: 1px solid var(--border2);
  border-radius: 5px; background: none; cursor: pointer; padding: 1px; flex-shrink: 0;
}

/* btn */
.btn {
  padding: 7px 12px; border-radius: 8px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: none; display: flex; align-items: center; gap: 5px;
  transition: transform .1s, opacity .15s;
}
.btn:active { transform: scale(.97); }
.btn-green { background: linear-gradient(135deg,#22c55e,#15803d); color: #fff; box-shadow: 0 3px 10px rgba(34,197,94,.2); }
.btn-green:hover { opacity: .88; }
.btn-ghost { background: var(--surface2); color: #94a3b8; border: 1px solid var(--border2); }
.btn-ghost:hover { background: #334155; color: var(--text); }

/* ═══════════════════════════════════
   PERSON PANEL
═══════════════════════════════════ */
.rp-tools { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; padding-bottom: 4px; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 10px; }
.rp-search {
  width: 100%; background: var(--surface2) !important;
  border: 1px solid var(--border2) !important; color: var(--text) !important;
  border-radius: 7px !important; padding: 5px 9px 5px 28px !important; font-size: 11px; outline: none;
}
.rp-search:focus { border-color: #6366f1 !important; }
.rp-btn-row { display: flex; gap: 5px; }
.rp-btn {
  flex: 1; padding: 5px 6px; border-radius: 6px; border: none;
  font-size: 10px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}

.pk-name-wrap { flex: 1; min-width: 0; }
.pk-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pk-meta { font-size: 8.5px; color: var(--muted); margin-top: 1px; }
.pk-actions { display: flex; gap: 3px; flex-shrink: 0; }

}
.pk-title-row:hover { border-color: #6366f1; background: rgba(99,102,241,.1); }
.pt-badge {
  font-size: 8px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
  color: #fff; background: #334155; border-radius: 4px; padding: 1px 5px; flex-shrink: 0;
}
.pt-text { font-size: 10px; color: #94a3b8; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-load {

.pk-title-empty { opacity: .5; cursor: default; }
.pt-text-empty { font-size: 9.5px; color: #475569; font-style: italic; flex: 1; }
.pt-load-add { background: rgba(34,197,94,.15) !important; color: #4ade80 !important; }
.rp-empty { color: #475569; font-size: 11px; text-align: center; padding: 20px 12px; line-height: 1.8; }

.ic-yellow { background: rgba(234,179,8,.14);  color: #facc15; }

.hs-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

.hs-title h3 { font-size: 13px; font-weight: 800; color: var(--text); margin: 0; }
.hs-title p  { font-size: 9.5px; color: #475569; margin: 1px 0 0; }
.h-tip { display: flex; gap: 9px; align-items: flex-start; background: #111827; border: 1px solid #1e293b; border-radius: 9px; padding: 9px 11px; margin-bottom: 5px; }

.h-step-txt span { font-size: 9px; color: var(--muted); line-height: 1.6; }
.h-highlight { background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25); border-radius: 9px; padding: 9px 11px; display: flex; gap: 8px; align-items: flex-start; }
.h-highlight i { color: #818cf8; font-size: 12px; margin-top: 1px; flex-shrink: 0; }

.help-topic-btn {
  width: 100%; text-align: left; padding: 6px 9px;
  background: transparent; border: none; color: #475569;

function togglePanel(key, btn) {
  const drawer = $('panelDrawer');
  const canvasZone = $('canvasZone');

  if (_currentPanel === key) {
    closePanel();
    return;
  }
  _currentPanel = key;

  // Update header
  const cfg = PANELS[key];
  $('pdIcon').className = 'pd-header-icon ' + cfg.iconCls;
  $('pdIcon').innerHTML = `<i class="fa-solid ${cfg.icon}"></i>`;
  $('pdTitle').textContent = cfg.title;

  // Inject content
  $('pdBody').innerHTML = cfg.html();

  // Open drawer
  drawer.classList.add('open');
  canvasZone.classList.add('panel-open');

  // Nav active
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  // Post-render
  setTimeout(() => {
    if (key === 'persons') renderPersons();
    if (key === 'photo') {
      // re-bind bgImgInput
      const inp = $('bgImgInput');
      // already in layout panel, not photo
    }
  }, 0);
}

function closePanel() {
  _currentPanel = null;
  $('panelDrawer').classList.remove('open');
  $('canvasZone').classList.remove('panel-open');
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('active'));
}

function updateNameBarRadius() {
  const r = _barR + 'px';
  const isTop = _namePos.startsWith('top');
  // namebar-bottom → bar altta görünür (order:2), köşe üstte açılır
  // namebar-top → bar üstte (order:1), köşe altta
  const m = isTop
    ? { 'top-left':'0 0 '+r+' 0','top-right':'0 0 0 '+r }
    : { 'bottom-left':'0 '+r+' 0 0','bottom-right':r+' 0 0 0' };
  $('nameBar').style.borderRadius = m[_namePos] || '0';
}

const capF = s => s[0].toUpperCase() + s.slice(1);
function syncMargins(changed) {
  if (changed !== 'all') {
    const el = $('slM' + capF(changed));
    if (el) mg[changed] = parseInt(el.value);
    if (_marginLink && changed !== 'bottom') {
      mg.top = mg.right = mg.left = mg[changed];
      mg.bottom = Math.round(mg[changed] * 1.67); // ~%25 / %15
    }
  } else if (_marginLink) {
    mg.right = mg.top; mg.left = mg.top; mg.bottom = Math.round(mg.top * 1.67);
  }
  ['top','right','bottom','left'].forEach(s => {
    const sl = $('slM' + capF(s)); if (sl) sl.value = mg[s];
    const vl = $('m' + capF(s) + 'Val'); if (vl) vl.textContent = mg[s] + 'px';
  });
  // padding değerleri px değil %, JS override etmiyor — manuel slider'dan gelirse uygula
  const f = $('bgFrame');
  if (changed !== 'all' || (mg.top !== 0)) {
    f.style.padding = `${mg.top}px ${mg.right}px ${mg.bottom}px ${mg.left}px`;
  }
}

function resetSettings() {
  if (!confirm('Tüm tasarım ayarları varsayılana sıfırlanacak. Emin misiniz?')) return;
  try { localStorage.removeItem(SETTINGS_KEY); } catch(e) {}
  location.reload();
}

function exportSettings() {
  // saveSettings ile aynı yapı — localStorage'daki güncel veriyi kullan
  saveSettings();
  const raw = localStorage.getItem(SETTINGS_KEY) || '{}';
  const blob = new Blob([raw], {type:'application/json'});
  downloadBlob(blob, 'grafik_ayarlari.json');
}

function importSettings(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const s = JSON.parse(ev.target.result);
      if (!s.version) throw new Error('Geçersiz ayar dosyası');
      // State güncelle
      if (s.layout)    { _layout = s.layout; }
      if (s.namePos)   { _namePos = s.namePos; }
      if (s.showTitle !== undefined) _showTitle = s.showTitle;
      if (s.showNameBar !== undefined) _showNameBar = s.showNameBar;
      if (s.photoW)    _photoW = s.photoW;
      if (s.cardR !== undefined) _cardR = s.cardR;
      if (s.barR !== undefined)  _barR = s.barR;
      if (s.bgFit)     _bgFit = s.bgFit;
      if (s.bgOp)      _bgOp = s.bgOp;
      if (s.res)       _res = s.res;
      if (s.cusW)      _cusW = s.cusW;
      if (s.cusH)      _cusH = s.cusH;
      if (s.fmt)       _fmt = s.fmt;
      if (s.quality)   _quality = s.quality;
      if (s.mg)        Object.assign(mg, s.mg);
      if (s.fs)        Object.assign(fs, s.fs);
      if (s.ts)        Object.assign(ts, s.ts);
      if (s.tx)        Object.assign(tx, s.tx);
      if (s.cl)        Object.assign(cl, s.cl);
      // Görsel uygula
      setLayout(_layout);
      setNamePos(_namePos, null);
      applyBgGrad();
      applyBarColor();
      applyText();
      card.style.borderRadius = _cardR + 'px';
      document.documentElement.style.setProperty('--bar-r', _barR + 'px');
      updateNameBarRadius();
      applyMargins();
      applyBgStyle();
      applyFilters();
      applyTint();
      // Açık paneli yenile
      if (_currentPanel) {
        const btn = document.querySelector(`[data-key="${_currentPanel}"]`);
        togglePanel(_currentPanel, btn);
      }
      alert('✓ Ayarlar yüklendi.');
    } catch(e) { alert('Hata: ' + e.message); }
    input.value = '';
  };
  r.readAsText(file);
}

function applyFrameColor() {
  const f = $('bgFrame');
  const rows = $('frameColorRows');
  const cb = $('cbFrameTransparent');
  if(cb) cl.frameTransparent = cb.checked;
  if(rows) rows.style.display = cl.frameTransparent ? 'none' : '';

    f.style.background = 'transparent';

  f.style.boxShadow = '0 0 0 1px rgba(255,255,255,.06), 0 24px 60px rgba(0,0,0,.8)';
  const c1=$('frameC1'),c2=$('frameC2'),ang=$('slFrameAngle'),cb2=$('cbSolidFrame'),fs2=$('frameSolid');
  if(c1) cl.frameC1=c1.value; if(c2) cl.frameC2=c2.value;
  if(ang){ cl.frameAngle=parseInt(ang.value); const v=$('frameAngleVal'); if(v) v.textContent=cl.frameAngle+'°'; }
  if(cb2) cl.frameSolid=cb2.checked;
  if(fs2) cl.frameSolidColor=fs2.value;
  const alpha = cl.frameOp ?? 1;
  if(cl.frameSolid) {
    f.style.background = hexToRgba(cl.frameSolidColor, alpha);
  } else {
    f.style.background = gradWithAlpha(cl.frameC1, cl.frameC2, cl.frameAngle, alpha);
  }

}

function applyFrameOp(val) {
  cl.frameOp = parseInt(val) / 100;
  const v = $('frameOpVal'); if(v) v.textContent = val + '%';
  // sadece opaklık değişince rengi yeniden uygula
  const f = $('bgFrame');
  if(cl.frameTransparent) return;
  const alpha = cl.frameOp;
  if(cl.frameSolid) {
    f.style.background = hexToRgba(cl.frameSolidColor, alpha);
  } else {
    f.style.background = gradWithAlpha(cl.frameC1, cl.frameC2, cl.frameAngle, alpha);
  }
  if(window._scheduleSave) window._scheduleSave();
}

// hex rengi rgba'ya çevir (alpha: 0-1)
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
// gradient içindeki hex renklere alpha uygula
function gradWithAlpha(c1, c2, angle, alpha) {
  return `linear-gradient(${angle}deg,${hexToRgba(c1,alpha)},${hexToRgba(c2,alpha)})`;
}

function applyCpOp(val) {
  cl.cpOp = parseInt(val) / 100;
  const v = $('cpOpVal'); if(v) v.textContent = val + '%';
  // opacity yerine background'un alpha'sını değiştir — yazılar etkilenmez
  const cp = $('contentPanel');
  cp.style.opacity = '';  // önceki opacity varsa temizle
  if(cl.bgSolid) {
    cp.style.background = hexToRgba(cl.bgSolidColor, cl.cpOp);
  } else {
    cp.style.background = gradWithAlpha(cl.bgC1, cl.bgC2, cl.bgAngle, cl.cpOp);
  }
  if(window._scheduleSave) window._scheduleSave();
}

  const tc=r('tColor'); if(tc){tx.tColor=tc.value;} t.style.color=tx.tColor;

  // Taşma kontrolü — her alan için auto-fit
  requestAnimationFrame(() => {
    autoFitField(q, $('quoteArea'),  tx.qSz,  8);

    autoFitField(t, $('nameBar'),    tx.tSz,  7);
  });
  if(window._scheduleSave) window._scheduleSave();

/* Alanın container'ına sığana kadar font küçült (min: minSz) */
function autoFitField(el, container, baseSz, minSz) {
  if (!el || !container) return;
  let sz = parseFloat(el.style.fontSize) || baseSz;
  // Önce base boyuta getir, sonra küçült
  el.style.fontSize = sz + 'px';
  let iter = 0;
  while (iter++ < 40) {
    if (el.scrollHeight <= container.clientHeight + 1) break;
    sz = Math.max(minSz, sz - 0.5);
    el.style.fontSize = sz + 'px';
    if (sz <= minSz) break;
  }
}

/* Tüm alanları yeniden fit et (metin girilince çağrılır) */
function autoFitAll() {
  requestAnimationFrame(() => {
    autoFitField($('quoteText'), $('quoteArea'), tx.qSz, 8);
    autoFitField($('nameField'), $('nameBar'),   tx.nSz, 7);
    autoFitField($('titleField'),$('nameBar'),   tx.tSz, 7);
  });
}

  if(br){fs.br=parseInt(br.value);const v=$('brVal');if(v)v.textContent=fs.br;}

  if(sat){fs.sat=parseInt(sat.value);const v=$('satVal');if(v)v.textContent=fs.sat;}
  if(blr){fs.blur=parseFloat(blr.value);const v=$('blurVal');if(v)v.textContent=fs.blur;}
  if(op){fs.op=parseInt(op.value);const v=$('imgOpVal');if(v)v.textContent=fs.op+'%';}
  img.style.filter=`brightness(${fs.br}%) contrast(${fs.ct}%) saturate(${fs.sat}%) blur(${fs.blur}px)`;
  img.style.opacity=fs.op/100;
  if(window._scheduleSave) window._scheduleSave();
}
function applyTint() {
  const tc=$('tintColor'),sl=$('slTint');
  if(tc) ts.color=tc.value; if(sl){ts.amount=parseInt(sl.value);const v=$('tintVal');if(v)v.textContent=ts.amount+'%';}
  const t=$('photoTint'); t.style.background=ts.color; t.style.opacity=ts.amount/100;
  if(window._scheduleSave) window._scheduleSave();
}
function applyPreset(t){
  const p={normal:{br:100,ct:100,sat:100,blur:0},bw:{br:100,ct:110,sat:0,blur:0},
    sepia:{br:105,ct:100,sat:50,blur:0},vivid:{br:110,ct:120,sat:160,blur:0},
    dark:{br:65,ct:110,sat:90,blur:0},soft:{br:110,ct:85,sat:80,blur:1.5}}[t];
  if(!p) return;
  Object.assign(fs,{br:p.br,ct:p.ct,sat:p.sat,blur:p.blur});
  const sl=$('slBr');if(sl){sl.value=p.br;} const sc=$('slCt');if(sc)sc.value=p.ct;
  const ss=$('slSat');if(ss)ss.value=p.sat; const sb=$('slBlur');if(sb)sb.value=p.blur;
  applyFilters();
}

/* ══════════════════════════════════════
   PHOTO PAN / ZOOM
══════════════════════════════════════ */
const panel=$('photoPanel'), photoImg=$('photoImg'), fileInp=$('fileInput');
let imgLoaded=false,photoBase64=null,scale=1,ox=0,oy=0,flipH=false,flipV=false;
let dragging=false,sx=0,sy=0,sox=0,soy=0;

function applyTransform(){
  const sw=flipH?-scale:scale,sh=flipV?-scale:scale;
  const tx2=flipH?photoImg.naturalWidth*scale:0,ty2=flipV?photoImg.naturalHeight*scale:0;
  photoImg.style.transform=`translate(${ox+tx2}px,${oy+ty2}px) scale(${sw},${sh})`;
}
function fitCover(){
  const pw=panel.offsetWidth,ph=panel.offsetHeight;
  scale=Math.max(pw/photoImg.naturalWidth,ph/photoImg.naturalHeight);
  ox=(pw-photoImg.naturalWidth*scale)/2; oy=(ph-photoImg.naturalHeight*scale)/2;
  applyTransform();
}
function zoomAt(cx,cy,d){
  const ns=Math.min(Math.max(scale+d,.1),10);
  const ix=(cx-ox)/scale,iy=(cy-oy)/scale;
  scale=ns; ox=cx-ix*scale; oy=cy-iy*scale; applyTransform();
}
function loadFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const r=new FileReader();
  r.onload=ev=>{
    photoBase64=ev.target.result;
    photoImg.onload=()=>{
      photoImg.style.display='block'; imgLoaded=true;
      panel.classList.remove('empty'); panel.classList.add('has-img'); fitCover();
    };
    photoImg.src=photoBase64;
  };
  r.readAsDataURL(file);
}
fileInp.addEventListener('change',e=>{ loadFile(e.target.files[0]); fileInp.value=''; });
panel.addEventListener('click',e=>{
  if(dragging) return;
  if(e.target.closest('.photo-controls')) return;
  if(!imgLoaded) fileInp.click();
});
panel.addEventListener('dragover',e=>{e.preventDefault();panel.classList.add('drag-over');});
panel.addEventListener('dragleave',()=>panel.classList.remove('drag-over'));
panel.addEventListener('drop',e=>{e.preventDefault();panel.classList.remove('drag-over');loadFile(e.dataTransfer.files[0]);});
panel.addEventListener('mousedown',e=>{
  if(!imgLoaded||e.target.closest('.photo-controls')) return;
  dragging=false; sx=e.clientX; sy=e.clientY; sox=ox; soy=oy;
  panel.classList.add('grabbing');
  const mv=ev=>{ const dx=ev.clientX-sx,dy=ev.clientY-sy; if(Math.abs(dx)+Math.abs(dy)>3) dragging=true; ox=sox+dx; oy=soy+dy; applyTransform(); };
  const up=()=>{ panel.classList.remove('grabbing'); window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); setTimeout(()=>{dragging=false;},0); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up); e.preventDefault();
});

// Touch
let tSX=0,tSY=0,tSOX=0,tSOY=0,tDrag=false,lastPinch=0;
panel.addEventListener('touchstart',e=>{
  if(e.touches.length===2){ lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); return; }
  if(!imgLoaded||e.target.closest('.photo-controls')) return;
  const t=e.touches[0]; tSX=t.clientX; tSY=t.clientY; tSOX=ox; tSOY=oy; tDrag=false;
},{passive:true});
panel.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&imgLoaded){
    e.preventDefault();
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const delta=(dist-lastPinch)*.012;
    const r=panel.getBoundingClientRect();
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    zoomAt(cx,cy,delta); lastPinch=dist; return;
  }
  if(!imgLoaded) return;
  const t=e.touches[0]; const dx=t.clientX-tSX,dy=t.clientY-tSY;
  if(Math.abs(dx)+Math.abs(dy)>3) tDrag=true;
  ox=tSOX+dx; oy=tSOY+dy; applyTransform(); e.preventDefault();
},{passive:false});
panel.addEventListener('touchend',e=>{ if(!tDrag&&!imgLoaded) fileInp.click(); tDrag=false; });

panel.addEventListener('wheel',e=>{
  if(!imgLoaded) return; e.preventDefault();
  const r=panel.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?.1:-.1);
},{passive:false});

// Toolbar kontrol butonları — onclick ile bağlı (HTML'de)
function tbZoomIn(e){e.stopPropagation();zoomAt(panel.offsetWidth/2,panel.offsetHeight/2,.15);}
function tbZoomOut(e){e.stopPropagation();zoomAt(panel.offsetWidth/2,panel.offsetHeight/2,-.15);}
function tbFlipH(e){e.stopPropagation();flipH=!flipH;$('btnFlipH').classList.toggle('active',flipH);applyTransform();}
function tbFlipV(e){e.stopPropagation();flipV=!flipV;$('btnFlipV').classList.toggle('active',flipV);applyTransform();}
function tbReset(e){e.stopPropagation();flipH=flipV=false;$('btnFlipH').classList.remove('active');$('btnFlipV').classList.remove('active');fitCover();}
// photo-controls paneli için de bağla
document.addEventListener('DOMContentLoaded',()=>{
  const pcZI=$('pcBtnZoomIn'); if(pcZI) pcZI.onclick=e=>{e.stopPropagation();zoomAt(panel.offsetWidth/2,panel.offsetHeight/2,.15);};
  const pcZO=$('pcBtnZoomOut'); if(pcZO) pcZO.onclick=e=>{e.stopPropagation();zoomAt(panel.offsetWidth/2,panel.offsetHeight/2,-.15);};
  const pcFH=$('pcBtnFlipH'); if(pcFH) pcFH.onclick=e=>{e.stopPropagation();flipH=!flipH;$('btnFlipH').classList.toggle('active',flipH);applyTransform();};
  const pcFV=$('pcBtnFlipV'); if(pcFV) pcFV.onclick=e=>{e.stopPropagation();flipV=!flipV;$('btnFlipV').classList.toggle('active',flipV);applyTransform();};

function importPersonsXLSX(inp){

  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'}); const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const first=((rows[0]&&rows[0][0])||'').toString().toLowerCase();
      const start=(first.includes('ad')||first.includes('name'))?1:0;
      let added=0; const list=loadPersons();
      rows.slice(start).forEach(r=>{

        if(list.some(p=>p.name===name)) return;
        list.push({id:Date.now()+Math.random()*1000,name,title1:(r[1]||'').toString().trim(),title2:(r[2]||'').toString().trim()}); added++;

    }catch(err){alert('Hata:\
'+err.message);}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const canvasToBlob=(c,t,q)=>new Promise(r=>c.toBlob(r,t,q));


function loadImg(src){
  return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=rej; i.src=src; });
}
function roundRectPath(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function parseCssGradient(ctx,css,x,y,w,h){
  if(!css) return null;
  const degM=css.match(/linear-gradient\(\s*(-?\d+(?:\.\d+)?)deg/);
  if(!degM) return null;
  const deg=parseFloat(degM[1]);
  const inner=css.replace(/^linear-gradient\(\s*/,'').replace(/\)\s*$/,'');
  const afterAngle=inner.replace(/^\s*-?\d+(?:\.\d+)?deg\s*,\s*/,'');
  const colors=[];
  let depth=0,cur='';
  for(let i=0;i<afterAngle.length;i++){
    const c=afterAngle[i];
    if(c==='(')depth++;
    else if(c===')')depth--;
    if(c===','&&depth===0){colors.push(cur.trim());cur='';}
    else cur+=c;
  }
  if(cur.trim())colors.push(cur.trim());
  if(colors.length<2)return null;
  const rad=(deg-90)*Math.PI/180;
  const g=ctx.createLinearGradient(x+w/2-Math.cos(rad)*w/2,y+h/2-Math.sin(rad)*h/2,x+w/2+Math.cos(rad)*w/2,y+h/2+Math.sin(rad)*h/2);
  try{colors.forEach((c,i)=>{g.addColorStop(i/(colors.length-1),c);});}catch(e){return null;}
  return g;
}
function wrapAndDraw(ctx,text,x,y,maxW,lineH){
  if(!text) return;
  for(const line of text.split('\n')){
    let cur='';
    for(const w of line.split(' ')){
      const test=cur?cur+' '+w:w;
      if(ctx.measureText(test).width>maxW&&cur){ ctx.fillText(cur,x,y); y+=lineH; cur=w; } else cur=test;
    }
    ctx.fillText(cur,x,y); y+=lineH;
  }
}

async function exportImg(){
  const defName='grafik_export';
  const userInput=await promptExportName(defName);
  if(userInput===null) return;
  const fileName=(userInput.trim()||defName).replace(/[^a-zA-Z0-9_\-\u011f\u00fc\u015f\u0131\u00f6\u00e7\u011e\u00dc\u015e\u0130\u00d6\u00c7 ]/g,'_');
  $('exportOverlay').classList.add('on');
  await sleep(120);
  try{
    let W,H;
    if(_res==='custom'){ const cw=$('cusW'),ch=$('cusH'); W=parseInt(cw?cw.value:1920)||1920; H=parseInt(ch?ch.value:1080)||1080; }
    else [W,H]=_res.split('x').map(Number);
    const quality=_quality/100;
    const mime=_fmt==='png'?'image/png':_fmt==='webp'?'image/webp':'image/jpeg';
    const ext=_fmt==='png'?'png':_fmt==='webp'?'webp':'jpg';

    const bgFrame=$('bgFrame');
    const fR=bgFrame.getBoundingClientRect();
    const scX=W/fR.width, scY=H/fR.height;
    const canvas=document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');

    // 1. bg-frame arka plan rengi — şeffaf ise PNG için saydam bırak
    if(cl.frameTransparent) {
      // şeffaf — hiçbir şey çizme, PNG şeffaf çıkar
    } else {
      const fAlpha = cl.frameOp ?? 1;
      if(cl.frameSolid) {
        const r=parseInt(cl.frameSolidColor.slice(1,3),16),g=parseInt(cl.frameSolidColor.slice(3,5),16),b=parseInt(cl.frameSolidColor.slice(5,7),16);
        ctx.fillStyle=`rgba(${r},${g},${b},${fAlpha})`;
      } else {
        const grad=ctx.createLinearGradient(
          W/2-Math.cos((cl.frameAngle-90)*Math.PI/180)*W/2, H/2-Math.sin((cl.frameAngle-90)*Math.PI/180)*H/2,
          W/2+Math.cos((cl.frameAngle-90)*Math.PI/180)*W/2, H/2+Math.sin((cl.frameAngle-90)*Math.PI/180)*H/2
        );
        const r1=parseInt(cl.frameC1.slice(1,3),16),g1=parseInt(cl.frameC1.slice(3,5),16),b1=parseInt(cl.frameC1.slice(5,7),16);
        const r2=parseInt(cl.frameC2.slice(1,3),16),g2=parseInt(cl.frameC2.slice(3,5),16),b2=parseInt(cl.frameC2.slice(5,7),16);
        grad.addColorStop(0,`rgba(${r1},${g1},${b1},${fAlpha})`);
        grad.addColorStop(1,`rgba(${r2},${g2},${b2},${fAlpha})`);
        ctx.fillStyle=grad;
      }
      ctx.fillRect(0,0,W,H);
    }

    // 2. Arka plan görseli — bgBase64 varsa üstüne çiz
    if(bgBase64){
      try {
        const bImg=await loadImg(bgBase64);
        ctx.save(); ctx.globalAlpha=_bgOp/100;
        if(_bgFit==='contain'){
          const s=Math.min(W/bImg.naturalWidth,H/bImg.naturalHeight);
          ctx.drawImage(bImg,(W-bImg.naturalWidth*s)/2,(H-bImg.naturalHeight*s)/2,bImg.naturalWidth*s,bImg.naturalHeight*s);
        } else if(_bgFit==='fill'){
          ctx.drawImage(bImg,0,0,W,H);
        } else {
          // cover
          const s=Math.max(W/bImg.naturalWidth,H/bImg.naturalHeight);
          ctx.drawImage(bImg,(W-bImg.naturalWidth*s)/2,(H-bImg.naturalHeight*s)/2,bImg.naturalWidth*s,bImg.naturalHeight*s);
        }
        ctx.restore();
      } catch(imgErr){ console.warn('bg img err',imgErr); }
    }

    // 3. İçerik paneli için arka plan rengi (kart çizilmeden önce tüm yüzey)
    const cpEl=$('contentPanel');

    // Koordinat yardımcısı
    function dc(el){ const r=el.getBoundingClientRect(); return {x:(r.left-fR.left)*scX,y:(r.top-fR.top)*scY,w:r.width*scX,h:r.height*scY}; }

    // Kart clip
    const cc=dc($('card'));
    roundRectPath(ctx,cc.x,cc.y,cc.w,cc.h,_cardR*Math.min(scX,scY));
    ctx.save(); ctx.clip();

    // Fotoğraf paneli
    const pc=dc($('photoPanel'));
    ctx.fillStyle=cl.photoBg||'#1a1a2e'; ctx.fillRect(pc.x,pc.y,pc.w,pc.h);
    if(imgLoaded&&photoBase64){
      const pImg=await loadImg(photoBase64);
      ctx.save();
      ctx.beginPath(); ctx.rect(pc.x,pc.y,pc.w,pc.h); ctx.clip();
      const si=scale*Math.min(scX,scY);
      ctx.save();
      ctx.translate(pc.x+ox*scX+(flipH?pImg.naturalWidth*si:0), pc.y+oy*scY+(flipV?pImg.naturalHeight*si:0));
      ctx.scale(flipH?-si:si, flipV?-si:si);
      ctx.filter=`brightness(${fs.br}%)contrast(${fs.ct}%)saturate(${fs.sat}%)blur(${fs.blur*Math.min(scX,scY)}px)`;
      ctx.globalAlpha=fs.op/100;
      ctx.drawImage(pImg,0,0,pImg.naturalWidth,pImg.naturalHeight);
      ctx.restore();
      if(ts.amount>0){ ctx.globalAlpha=ts.amount/100; ctx.fillStyle=ts.color; ctx.fillRect(pc.x,pc.y,pc.w,pc.h); }
      ctx.restore();
    }

    // Content panel — rgba alpha ile çiz (yazılar etkilenmiyor)
    ctx.globalAlpha=1; ctx.filter='none';
    const cpC=dc(cpEl);
    const cpAlpha = cl.cpOp ?? 1;
    if(cl.bgSolid) {
      const r=parseInt(cl.bgSolidColor.slice(1,3),16),g=parseInt(cl.bgSolidColor.slice(3,5),16),b=parseInt(cl.bgSolidColor.slice(5,7),16);
      ctx.fillStyle=`rgba(${r},${g},${b},${cpAlpha})`;
      ctx.fillRect(cpC.x,cpC.y,cpC.w,cpC.h);
    } else {
      const grad=parseCssGradient(ctx,cpEl.style.background,cpC.x,cpC.y,cpC.w,cpC.h);
      if(grad){ ctx.fillStyle=grad; ctx.globalAlpha=cpAlpha; ctx.fillRect(cpC.x,cpC.y,cpC.w,cpC.h); ctx.globalAlpha=1; }
      else {
        // fallback: iki renk arasında manuel gradient
        const g2=ctx.createLinearGradient(cpC.x+cpC.w/2-Math.cos((cl.bgAngle-90)*Math.PI/180)*cpC.w/2,cpC.y+cpC.h/2,cpC.x+cpC.w/2+Math.cos((cl.bgAngle-90)*Math.PI/180)*cpC.w/2,cpC.y+cpC.h/2);
        const r1=parseInt(cl.bgC1.slice(1,3),16),g1=parseInt(cl.bgC1.slice(3,5),16),b1=parseInt(cl.bgC1.slice(5,7),16);
        const r2=parseInt(cl.bgC2.slice(1,3),16),g2b=parseInt(cl.bgC2.slice(3,5),16),b2=parseInt(cl.bgC2.slice(5,7),16);
        g2.addColorStop(0,`rgba(${r1},${g1},${b1},${cpAlpha})`);
        g2.addColorStop(1,`rgba(${r2},${g2b},${b2},${cpAlpha})`);
        ctx.fillStyle=g2; ctx.fillRect(cpC.x,cpC.y,cpC.w,cpC.h);
      }
    }

    // Alıntı zemini
    if(cl.quoteBgOp>0){ const qC=dc($('quoteBg')); ctx.globalAlpha=cl.quoteBgOp/100; ctx.fillStyle=cl.quoteBgColor; ctx.fillRect(qC.x,qC.y,qC.w,qC.h); ctx.globalAlpha=1; }

    // Ad barı
    if(_showNameBar){
      const nbC=dc($('nameBar'));
      const barBg=cl.barSolid?cl.barSolidColor:`linear-gradient(${cl.barAngle}deg,${cl.barC1},${cl.barC2})`;
      ctx.globalAlpha=cl.barOp/100;
      ctx.fillStyle=parseCssGradient(ctx,barBg,nbC.x,nbC.y,nbC.w,nbC.h)||barBg;
      const bR=_barR*Math.min(scX,scY);
      const brMap={'bottom-left':[0,bR,0,0],'bottom-right':[bR,0,0,0],'top-left':[0,0,bR,0],'top-right':[0,0,0,bR]};
      const [tl,tr,br2,bl]=brMap[_namePos]||[0,0,0,0];
      ctx.beginPath();
      ctx.moveTo(nbC.x+tl,nbC.y); ctx.lineTo(nbC.x+nbC.w-tr,nbC.y); ctx.quadraticCurveTo(nbC.x+nbC.w,nbC.y,nbC.x+nbC.w,nbC.y+tr);
      ctx.lineTo(nbC.x+nbC.w,nbC.y+nbC.h-br2); ctx.quadraticCurveTo(nbC.x+nbC.w,nbC.y+nbC.h,nbC.x+nbC.w-br2,nbC.y+nbC.h);
      ctx.lineTo(nbC.x+bl,nbC.y+nbC.h); ctx.quadraticCurveTo(nbC.x,nbC.y+nbC.h,nbC.x,nbC.y+nbC.h-bl);
      ctx.lineTo(nbC.x,nbC.y+tl); ctx.quadraticCurveTo(nbC.x,nbC.y,nbC.x+tl,nbC.y);
      ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
    }

    // ── Metinler: DOM'dan gerçek computed değerleri oku ──
    ctx.restore(); // kart clip'i kapat
    // Yeniden kart clip — metin için
    roundRectPath(ctx,cc.x,cc.y,cc.w,cc.h,_cardR*Math.min(scX,scY));
    ctx.save(); ctx.clip();

    function drawTextField(el, colorVal) {
      if (!el) return;
      const cs = window.getComputedStyle(el);
      const elC = dc(el);
      const sc = Math.min(scX, scY);
      // DOM'dan gerçek font boyutu — autoFit sonrası gerçek değer
      const domSzPx  = parseFloat(cs.fontSize) || 16;
      const scaledSz = domSzPx * sc;
      const fontFamily    = cs.fontFamily;
      const fontWeight    = cs.fontWeight;
      // lineHeight: DOM'dan oku, normal ise 1.4x kullan
      const domLH   = parseFloat(cs.lineHeight);
      const realLH  = (isNaN(domLH) ? domSzPx * 1.4 : domLH) * sc;
      const letterSpacing = parseFloat(cs.letterSpacing) || 0;
      const textAlign = cs.textAlign || 'left';
      const color = colorVal || cs.color || '#fff';
      const text = el.textContent || '';
      if (!text.trim()) return;

      ctx.save();
      // clip to el bounding box
      ctx.beginPath();
      ctx.rect(elC.x, elC.y, elC.w, elC.h);
      ctx.clip();

      ctx.textBaseline = 'top';
      ctx.font = `${fontWeight} ${scaledSz}px ${fontFamily}`;
      ctx.letterSpacing = (letterSpacing * Math.min(scX,scY)) + 'px';
      ctx.fillStyle = color;

      // metin sarmala ve çiz
      const lines = [];
      for (const rawLine of text.split('\n')) {
        const words = rawLine.split(' ');
        let cur = '';
        for (const w of words) {
          const test = cur ? cur + ' ' + w : w;
          if (ctx.measureText(test).width > elC.w && cur) {
            lines.push(cur); cur = w;
          } else { cur = test; }
        }
        lines.push(cur);
      }

      let startX = elC.x;
      if (textAlign === 'center') startX = elC.x + elC.w / 2;
      else if (textAlign === 'right') startX = elC.x + elC.w;

      let y = elC.y;
      for (const line of lines) {
        if (textAlign === 'center') ctx.textAlign = 'center';
        else if (textAlign === 'right') ctx.textAlign = 'right';
        else ctx.textAlign = 'left';
        ctx.fillText(line, startX, y);
        y += realLH;
        if (y > elC.y + elC.h) break; // clip korur ama satır boşa gitmesin
      }
      ctx.restore();
    }

    // Quote alanı
    const qtEl = $('quoteText');
    drawTextField(qtEl, tx.qColor);

    // Ad alanı
    const nfEl = $('nameField');
    drawTextField(nfEl, tx.nColor);

    // Ünvan alanı
    if (_showTitle) {
      const tfEl = $('titleField');
      if (tfEl && tfEl.style.display !== 'none') {
        drawTextField(tfEl, tx.tColor);
      }
    }

    ctx.restore(); // son kart clip

    canvas.toBlob(blob=>{
      if(blob){
        downloadBlob(blob,`${fileName}.${ext}`);
      } else {
        // toBlob fallback via toDataURL
        try {
          const dataUrl = canvas.toDataURL(mime, quality);
          const arr = dataUrl.split(','), bstr = atob(arr[1]);
          let n = bstr.length; const u8 = new Uint8Array(n);
          while(n--) u8[n] = bstr.charCodeAt(n);
          downloadBlob(new Blob([u8],{type:mime}),`${fileName}.${ext}`);
        } catch(e2){ alert('İndirme hatası:\n'+e2.message); }
      }
      $('exportOverlay').classList.remove('on');
    }, mime, quality);
  } catch(err){
    console.error(err); alert('Export hatası:\n'+err.message);
    $('exportOverlay').classList.remove('on');
  }
}

function promptExportName(def){
  return new Promise(resolve=>{
    const old=$('exportNameModal'); if(old) old.remove();
    const m=document.createElement('div'); m.id='exportNameModal';
    m.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';
    m.innerHTML=`<div style="background:#1e293b;border:1px solid #334155;border-radius:14px;width:360px;max-width:94vw;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;align-items:center;gap:10px;"><i class="fa-solid fa-file-image" style="color:#22c55e;font-size:15px;"></i>
        <span style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1;">Görsel Adı</span>
        <button id="enClose" style="background:none;border:none;color:#64748b;font-size:16px;cursor:pointer;padding:2px 6px;">✕</button></div>
      <div><label style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;">Dosya adı (opsiyonel)</label>
        <input id="enInput" type="text" placeholder="${def}" value="${def}" style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px 11px;font-size:12.5px;outline:none;font-family:inherit;box-sizing:border-box;"></div>
      <div style="display:flex;gap:8px;">
        <button id="enCancel" style="flex:1;padding:8px;border-radius:8px;border:none;background:#334155;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;">İptal</button>
        <button id="enOk" style="flex:2;padding:8px;border-radius:8px;border:none;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;"><i class="fa-solid fa-download"></i> İndir</button>
      </div></div>`;
    document.body.appendChild(m);
    const inp=$('enInput'); setTimeout(()=>{inp.select();inp.focus();},80);
    const ok=()=>{const v=inp.value;m.remove();resolve(v);};
    const cancel=()=>{m.remove();resolve(null);};
    $('enOk').onclick=ok; $('enCancel').onclick=cancel; $('enClose').onclick=cancel;
    m.onclick=e=>{if(e.target===m)cancel();};
    inp.onkeydown=e=>{if(e.key==='Enter')ok();if(e.key==='Escape')cancel();};
  });
}

function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.style.display='none';
  a.href=url;
  a.download=name;
  document.body.appendChild(a);
  a.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,view:window}));
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},2000);
}

function applyMargins() {
  // Padding CSS'de % olarak tanımlandı (sağ/sol %15, üst ~8.44%, alt ~14.06%)
  // Slider gösterimi için px karşılıklarını hesapla
  const f = $('bgFrame');
  if (!f) return;
  const fw = f.offsetWidth  || 800;
  const fh = f.offsetHeight || 450;
  mg.left   = Math.round(fw * 0.15);
  mg.right  = Math.round(fw * 0.15);
  mg.top    = Math.round(fh * 0.15);
  mg.bottom = Math.round(fh * 0.25);
  // Sadece slider değerlerini güncelle, padding CSS'den geliyor
  ['top','right','bottom','left'].forEach(s => {
    const sl = $('slM' + (s[0].toUpperCase()+s.slice(1))); if (sl) sl.value = mg[s];
    const vl = $('m' + (s[0].toUpperCase()+s.slice(1)) + 'Val'); if (vl) vl.textContent = mg[s] + 'px';
  });
  // padding'i yeniden uygula (CSS override — px cinsinden)
  f.style.padding = `${mg.top}px ${mg.right}px ${mg.bottom}px ${mg.left}px`;
}

(function init(){
  // Kaydedilmiş layout/namePos uygula
  setLayout(_layout);
  setNamePos(_namePos, null);
  if (!_showNameBar) { $('nameBarWrap').style.display='none'; }
  if (!_showTitle)   { const t=$('titleField'); if(t) t.style.display='none'; }
  applyFrameColor();
  applyBgGrad();
  applyBarColor();
  applyText();
  updateNameBarRadius();
  card.style.borderRadius = _cardR + 'px';
  document.documentElement.style.setProperty('--bar-r', _barR + 'px');
  applyBgStyle();
  applyFilters();
  applyTint();
  requestAnimationFrame(() => { applyMargins(); });
  window.addEventListener('resize', () => { applyMargins(); });

  // Tüm state değişikliklerini otomatik kaydet (debounced)
  let _saveTimer = null;
  window._scheduleSave = () => {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(saveSettings, 600);
  };
})();
