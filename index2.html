<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grafik Şablon 2025</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&family=Montserrat:wght@400;600;700;800&family=Lato:wght@300;400;700&family=Oswald:wght@400;600;700&family=Raleway:wght@400;600;700&family=Poppins:wght@300;400;600;700&family=Source+Sans+3:wght@300;400;600;700&family=Nunito:wght@300;400;600;700&family=Ubuntu:wght@300;400;700&family=Playfair+Display:wght@400;700&family=Merriweather:wght@300;400;700&family=PT+Sans:wght@400;700&family=Noto+Sans:wght@300;400;700&family=Roboto+Condensed:wght@300;400;700&family=Roboto+Slab:wght@300;400;700&family=Fira+Sans:wght@300;400;600;700&family=Barlow:wght@300;400;600;700&family=DM+Sans:wght@300;400;600;700&family=Manrope:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&family=Lexend:wght@300;400;600;700&family=Lora:wght@400;600;700&family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════ */
:root {
  --nav-h: 68px;
  --panel-h: 52vh;
  --accent: #60a5fa;
  --bg: #080e1c;
  --surface: #0f172a;
  --surface2: #1e293b;
  --border: #1e293b;
  --border2: #334155;
  --text: #e2e8f0;
  --muted: #64748b;
  --panel-transition: .32s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }

/* ═══════════════════════════════════
   APP SHELL
═══════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* ═══════════════════════════════════
   CANVAS ZONE
═══════════════════════════════════ */
#canvasZone {
  flex: 1 1 0;       /* 1 1 0: büyür de küçülür de, basis=0 */
  min-height: 0;     /* flex item'ın taşmasını önler */
  display: flex;
  flex-direction: column;   /* kart üstte, toolbar altta */
  align-items: stretch;
  justify-content: center;
  padding: 8px 14px 0;
  overflow: hidden;
  position: relative;
  gap: 6px;
  transition: flex var(--panel-transition);
}

/* canvasInner: kart + bg-frame — flex 1 ile büyür */
#canvasInner {
  flex: 1 1 0;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── PHOTO TOOLBAR ── */
#photoToolbar {
  flex-shrink: 0;
  height: 36px;
  display: flex;
  align-items: center;
  gap: 2px;
  background: rgba(7,12,24,.85);
  border: 1px solid #1e293b;
  border-radius: 10px;
  padding: 0 6px;
  backdrop-filter: blur(8px);
  /* kendisi mb olarak kullanılmaz, parent gap ile yeterli */
}
.ptb-btn {
  height: 28px;
  padding: 0 8px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: rgba(255,255,255,.45);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .04em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.ptb-btn i { font-size: 12px; }
.ptb-btn:hover { background: rgba(255,255,255,.08); color: #e2e8f0; }
.ptb-btn.active { background: rgba(99,102,241,.2); color: #a5b4fc; }
.ptb-sep {
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,.1);
  margin: 0 2px;
  flex-shrink: 0;
}
.ptb-sep.ptb-grow { width: auto; flex: 1; background: none; }
.ptb-dl {
  color: #4ade80 !important;
  background: rgba(34,197,94,.12) !important;
  border: 1px solid rgba(34,197,94,.2);
}
.ptb-dl:hover { background: rgba(34,197,94,.22) !important; color: #86efac !important; }

/* bg-wrap + bg-aspect: tam alanı kapla, kart içinde ortalansın */
.bg-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* bg-aspect: boyutları canvasZone'dan alır ama taşmaz */
.bg-aspect {
  /* Her iki eksende de sınırlı: içerik sığmıyorsa küçülür */
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/*
  bg-frame: 16:9 oranını korur, hem genişliğe hem yüksekliğe göre ölçeklenir.
  Trick: width: min(100%, calc(100vh * 16/9)) — ama daha sağlıklısı:
  aspect-ratio + max-height + width: auto kombinasyonu.
  height=100% ile başlar, width=auto aşağı iner; max-width ile de kısıtlanır.
*/
.bg-frame {
  aspect-ratio: 16 / 9;
  /* Yüksekliği parent'ın %100'ü, genişlik orandan hesaplanır */
  height: 100%;
  width: auto;
  /* Yatayda taşmasın */
  max-width: 100%;

  position: relative;
  border-radius: 14px; overflow: hidden;
  background: radial-gradient(ellipse at 30% 40%, #1e3a5f 0%, #0b1728 55%, #070d1a 100%);
  box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 24px 60px rgba(0,0,0,.8);
  display: flex; align-items: center; justify-content: center;
  padding: 80px;
  transition: padding .25s;
}

/* Kare / dikey oran overrides */
.bg-frame.ratio-square   { aspect-ratio: 1 / 1; }
.bg-frame.ratio-portrait { aspect-ratio: 9 / 16; }

#bgImgLayer {
  position: absolute; inset: 0;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  pointer-events: none;
}
.bg-frame::after {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.4) 100%);
}
.card-wrap { position: relative; z-index: 1; width: 100%; }

/* card-aspect also uses aspect-ratio */
.card-aspect {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  transition: aspect-ratio .3s;
}
.card-aspect.ratio-square   { aspect-ratio: 1 / 1; }
.card-aspect.ratio-portrait { aspect-ratio: 9 / 16; }

/* ── CARD ── */
.card-aspect { position: relative; }
.card-inner {
  position: absolute; inset: 0;
  display: flex; border-radius: 14px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.7);
}
.card-inner.photo-right  { flex-direction: row-reverse; }
.card-inner.photo-top    { flex-direction: column; }
.card-inner.photo-bottom { flex-direction: column-reverse; }
.card-inner.photo-top    .photo-panel,
.card-inner.photo-bottom .photo-panel { width: 100%; height: 55%; }
.card-inner.photo-top    .content-panel,
.card-inner.photo-bottom .content-panel { height: 45%; }

.photo-panel {
  position: relative; width: 42%; flex-shrink: 0; overflow: hidden;
  background: #1a1a2e; cursor: grab; user-select: none; transition: width .3s;
}
.photo-panel.grabbing { cursor: grabbing; }
#photoImg { position: absolute; transform-origin: 0 0; display: none; pointer-events: none; will-change: transform; }
#photoTint { position: absolute; inset: 0; pointer-events: none; z-index: 2; opacity: 0; }

.photo-overlay {
  position: absolute; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  transition: background .2s, opacity .2s; pointer-events: none;
}
.photo-panel.empty    .photo-overlay { background: rgba(0,0,0,.5); opacity: 1; }
.photo-panel.has-img  .photo-overlay { opacity: 0; }
.photo-panel.has-img:hover .photo-overlay { background: rgba(0,0,0,.35); opacity: 1; }
.photo-panel.drag-over .photo-overlay { background: rgba(0,0,0,.6); opacity: 1; }
.photo-panel.drag-over { outline: 2px dashed rgba(255,255,255,.6); outline-offset: -3px; }
.ov-label { color: #fff; font-size: clamp(8px,.9vw,11px); font-weight: 600; text-align: center; line-height: 1.6; }

.content-panel {
  flex: 1; position: relative; display: flex; flex-direction: column;
  justify-content: flex-end; overflow: visible;
}
.quote-area {
  position: absolute; top: 0; left: 0; right: 0;
  bottom: clamp(40px, 9%, 90px);
  padding: clamp(8px, 1.5vw, 24px);
  display: flex; align-items: center;
  transition: top .25s, bottom .25s;
}
.content-panel.namebar-top .quote-area { top: clamp(40px,9%,90px); bottom: 0; }
.content-panel.namebar-bottom .quote-area { top: 0; bottom: clamp(40px,9%,90px); }

#quoteText {
  color: #fff; line-height: 1.65; font-weight: 400;
  outline: none; width: 100%;
  text-shadow: 0 1px 3px rgba(0,0,0,.2);
  cursor: text; white-space: pre-wrap; word-break: break-word;
  position: relative; z-index: 1;
}
#quoteText:empty::before { content: attr(data-ph); color: rgba(255,255,255,.45); font-style: italic; pointer-events: none; font-size: .7em; }

.quote-bg {
  position: absolute; top: 0; left: 0; right: 0;
  bottom: clamp(40px,9%,90px);
  pointer-events: none; z-index: 1;
}
.content-panel.namebar-top .quote-bg { top: clamp(40px,9%,90px); bottom: 0; }

.name-bar-wrap {
  position: absolute; bottom: 0; left: 0; z-index: 3; display: flex; transition: all .25s;
}
.name-bar-wrap.pos-bottom-left  { bottom:0; left:0; right:auto; top:auto; align-items:flex-end; justify-content:flex-start; }
.name-bar-wrap.pos-bottom-right { bottom:0; right:0; left:auto; top:auto; align-items:flex-end; justify-content:flex-end; }
.name-bar-wrap.pos-top-left     { top:0; left:0; bottom:auto; right:auto; align-items:flex-start; justify-content:flex-start; }
.name-bar-wrap.pos-top-right    { top:0; right:0; bottom:auto; left:auto; align-items:flex-start; justify-content:flex-end; }

.name-bar {
  display: block;
  padding: clamp(6px,.9vw,12px) clamp(12px,1.8vw,28px);
  min-width: 44%; max-width: 100%; width: fit-content;
  position: relative; background: transparent !important;
  transition: border-radius .2s;
}
.name-bar-wrap.pos-bottom-left  .name-bar { border-radius: 0 var(--bar-r, 26px) 0 0; }
.name-bar-wrap.pos-bottom-right .name-bar { border-radius: var(--bar-r, 26px) 0 0 0; }
.name-bar-wrap.pos-top-left     .name-bar { border-radius: 0 0 var(--bar-r, 26px) 0; }
.name-bar-wrap.pos-top-right    .name-bar { border-radius: 0 0 0 var(--bar-r, 26px); }

.bar-bg { position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 0; }

#nameField, #titleField { position: relative; z-index: 1; }
#nameField {
  color: #fff; font-weight: 800; letter-spacing: .07em; text-transform: uppercase;
  outline: none; display: block; cursor: text; white-space: normal; word-break: break-word;
}
#nameField:empty::before { content: attr(data-ph); color: rgba(255,255,255,.35); font-style: italic; pointer-events: none; font-size: .65em; font-weight: 400; letter-spacing: 0; text-transform: none; }
#titleField {
  color: rgba(255,255,255,.85); font-weight: 400; letter-spacing: .03em;
  outline: none; display: block; margin-top: 3px; cursor: text; white-space: normal; word-break: break-word;
}
#titleField:empty::before { content: attr(data-ph); color: rgba(255,255,255,.3); font-style: italic; pointer-events: none; font-size: .7em; }
#nameField:focus, #titleField:focus { background: rgba(255,255,255,.07); border-radius: 3px; }

/* ═══════════════════════════════════
   HELP OVERLAY (inside canvas zone)
═══════════════════════════════════ */
#helpOverlay {
  display: none; position: absolute; inset: 0; z-index: 200;
  background: #080f1e; flex-direction: column;
  animation: hIn .22s ease;
}
#helpOverlay.on { display: flex; }
@keyframes hIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
.ho-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: #0d1526; border-bottom: 1px solid #1e293b; flex-shrink: 0;
}
.ho-topbar h4 { font-size: 13px; font-weight: 800; color: #e2e8f0; margin: 0; flex: 1; }
.ho-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: #1e293b; color: #64748b; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.ho-close:hover { background: #334155; color: #e2e8f0; }
.ho-body { flex: 1; overflow-y: auto; padding: 16px 18px 24px; display: flex; flex-direction: column; gap: 12px; }

/* ═══════════════════════════════════
   PANEL DRAWER
═══════════════════════════════════ */
#panelDrawer {
  flex-shrink: 0;
  height: 0;
  overflow: hidden;
  background: var(--surface);
  border-top: 1px solid var(--border);
  transition: height var(--panel-transition);
  display: flex;
  flex-direction: column;
}
#panelDrawer.open {
  height: var(--panel-h);
}

.pd-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: #0a1020;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.pd-header-icon {
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.pd-header h5 { font-size: 12px; font-weight: 700; color: var(--text); margin: 0; flex: 1; }
.pd-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: var(--surface2); color: var(--muted); font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.pd-close:hover { background: #334155; color: var(--text); }

.pd-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 8px 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.pd-body::-webkit-scrollbar { width: 3px; }
.pd-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

/* ═══════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════ */
#bottomNav {
  height: var(--nav-h);
  flex-shrink: 0;
  background: #070c18;
  border-top: 1px solid #111827;
  display: flex;
  align-items: stretch;
  box-shadow: 0 -4px 20px rgba(0,0,0,.5);
  z-index: 100;
}
.bn-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; border: none; background: transparent;
  color: rgba(255,255,255,.3);
  font-size: 8px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  cursor: pointer;
  transition: color .15s, background .15s;
  padding: 8px 2px 10px;
  position: relative;
}
.bn-btn i { font-size: 18px; transition: transform .2s; }
.bn-btn.active {
  color: var(--accent);
  background: rgba(96,165,250,.07);
}
.bn-btn.active::before {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent);
  border-radius: 0 0 3px 3px;
}
.bn-btn.active i { transform: translateY(-1px); }
.bn-btn:active { background: rgba(255,255,255,.05); }
.bn-btn.bn-dl { color: #22c55e; }
.bn-btn.bn-dl.active { color: #22c55e; background: rgba(34,197,94,.07); }
.bn-btn.bn-dl.active::before { background: #22c55e; }

/* ═══════════════════════════════════
   PANEL CONTENT COMPONENTS
═══════════════════════════════════ */
.sb-card {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; overflow: hidden; flex-shrink: 0;
}
.sb-card-head {
  padding: 6px 11px; background: #172033;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 6px;
}
.sb-card-head small {
  font-size: 8.5px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted);
}
.sb-card-head small i { color: var(--accent); }
.sb-card-body { padding: 5px 8px; display: flex; flex-direction: column; gap: 4px; }

.row { display: flex; align-items: center; gap: 4px; margin: 0; flex-wrap: nowrap; overflow: hidden; }
.lbl { font-size: 9.5px; font-weight: 600; color: var(--muted); white-space: nowrap; width: 54px; flex-shrink: 0; }
.val { font-size: 9.5px; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
.flex-fill { flex: 1 1 0; min-width: 0; }
.sb-hr { height: 1px; background: var(--border2); margin: 2px 0; }

.lg { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.lb {
  padding: 7px 4px; border: 1px solid var(--border2); border-radius: 7px;
  background: #0f172a; color: var(--muted);
  font-size: 9px; cursor: pointer; text-align: center;
  transition: background .15s, border-color .15s, color .15s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.lb i { font-size: 15px; }
.lb.active, .lb:hover { background: rgba(99,102,241,.2); border-color: #6366f1; color: #a5b4fc; }

.nb {
  padding: 6px 4px; border: 1px solid var(--border2); border-radius: 7px;
  background: #0f172a; color: var(--muted);
  font-size: 9px; cursor: pointer; text-align: center;
  transition: background .15s, border-color .15s, color .15s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.nb i { font-size: 13px; }
.nb.active, .nb:hover { background: rgba(99,102,241,.2); border-color: #6366f1; color: #a5b4fc; }

.ibg { display: flex; gap: 3px; }
.ib {
  width: 28px; height: 28px; border: 1px solid var(--border2); border-radius: 5px;
  background: #0f172a; color: var(--muted); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s;
}
.ib.active, .ib:hover { background: rgba(99,102,241,.2); color: #a5b4fc; border-color: #6366f1; }
.wb {
  padding: 3px 8px; border: 1px solid var(--border2); border-radius: 5px;
  background: #0f172a; color: var(--muted); font-size: 10px; cursor: pointer; transition: background .15s, color .15s;
}
.wb.active, .wb:hover { background: rgba(99,102,241,.2); color: #a5b4fc; border-color: #6366f1; }

/* form controls */
select, input[type=number], input[type=text] {
  min-width: 0; max-width: 100%;
  background: #0f172a !important; border: 1px solid var(--border2) !important;
  color: var(--text) !important; font-size: 11.5px;
  border-radius: 6px !important; padding: 4px 7px !important;
}
select:focus, input[type=number]:focus, input[type=text]:focus {
  box-shadow: 0 0 0 2px rgba(99,102,241,.25) !important;
  border-color: #6366f1 !important; outline: none;
}
select option { background: #1e293b; }
input[type=range] { accent-color: #6366f1; cursor: pointer; min-width: 0; flex: 1 1 0; display: block; }
input[type=color] {
  width: 28px; height: 26px; border: 1px solid var(--border2);
  border-radius: 5px; background: none; cursor: pointer; padding: 1px; flex-shrink: 0;
}

/* btn */
.btn {
  padding: 7px 12px; border-radius: 8px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: none; display: flex; align-items: center; gap: 5px;
  transition: transform .1s, opacity .15s;
}
.btn:active { transform: scale(.97); }
.btn-green { background: linear-gradient(135deg,#22c55e,#15803d); color: #fff; box-shadow: 0 3px 10px rgba(34,197,94,.2); }
.btn-green:hover { opacity: .88; }
.btn-ghost { background: var(--surface2); color: #94a3b8; border: 1px solid var(--border2); }
.btn-ghost:hover { background: #334155; color: var(--text); }

/* ═══════════════════════════════════
   PERSON PANEL
═══════════════════════════════════ */
.rp-tools { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; padding-bottom: 4px; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 10px; }
.rp-search {
  width: 100%; background: var(--surface2) !important;
  border: 1px solid var(--border2) !important; color: var(--text) !important;
  border-radius: 7px !important; padding: 5px 9px 5px 28px !important; font-size: 11px; outline: none;
}
.rp-search:focus { border-color: #6366f1 !important; }
.rp-btn-row { display: flex; gap: 5px; }
.rp-btn {
  flex: 1; padding: 5px 6px; border-radius: 6px; border: none;
  font-size: 10px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.rp-btn-save { background: #6366f1; color: #fff; }
.rp-btn-exp  { background: #0f766e; color: #fff; }
.rp-btn-imp  { background: #334155; color: #94a3b8; }

.pk {
  border: 1px solid var(--border2); border-radius: 9px;
  background: var(--surface2); overflow: hidden; transition: border-color .15s; flex-shrink: 0;
}
.pk:hover { border-color: #6366f1; }
.pk-top {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px 4px; cursor: pointer;
}
.pk-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.pk-name-wrap { flex: 1; min-width: 0; }
.pk-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pk-meta { font-size: 8.5px; color: var(--muted); margin-top: 1px; }
.pk-actions { display: flex; gap: 3px; flex-shrink: 0; }
.pk-ico {
  width: 22px; height: 22px; border-radius: 5px; border: none;
  font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.pk-ico-edit { background: rgba(99,102,241,.15); color: #818cf8; }
.pk-ico-edit:hover { background: rgba(99,102,241,.35); }
.pk-ico-del  { background: rgba(239,68,68,.12); color: #f87171; }
.pk-ico-del:hover { background: rgba(239,68,68,.3); }

.pk-titles { padding: 0 8px 6px; display: flex; flex-direction: column; gap: 3px; }
.pk-title-row {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 6px; border-radius: 6px; border: 1px solid var(--border2);
  cursor: pointer; background: #0f172a; transition: border-color .15s, background .15s;
}
.pk-title-row:hover { border-color: #6366f1; background: rgba(99,102,241,.1); }
.pt-badge {
  font-size: 8px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
  color: #fff; background: #334155; border-radius: 4px; padding: 1px 5px; flex-shrink: 0;
}
.pt-text { font-size: 10px; color: #94a3b8; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pt-load {
  width: 18px; height: 18px; border-radius: 4px; border: none; font-size: 9px;
  background: rgba(99,102,241,.2); color: #818cf8; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.pk-title-empty { opacity: .5; cursor: default; }
.pt-text-empty { font-size: 9.5px; color: #475569; font-style: italic; flex: 1; }
.pt-load-add { background: rgba(34,197,94,.15) !important; color: #4ade80 !important; }
.rp-empty { color: #475569; font-size: 11px; text-align: center; padding: 20px 12px; line-height: 1.8; }

/* ═══════════════════════════════════
   HELP COMPONENTS
═══════════════════════════════════ */
.ic-blue   { background: rgba(99,102,241,.18); color: #818cf8; }
.ic-green  { background: rgba(34,197,94,.14);  color: #4ade80; }
.ic-yellow { background: rgba(234,179,8,.14);  color: #facc15; }
.ic-red    { background: rgba(239,68,68,.14);  color: #f87171; }
.ic-purple { background: rgba(168,85,247,.14); color: #c084fc; }
.ic-cyan   { background: rgba(6,182,212,.14);  color: #22d3ee; }
.ic-orange { background: rgba(249,115,22,.14); color: #fb923c; }

.hs-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.hs-title-icon { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.hs-title h3 { font-size: 13px; font-weight: 800; color: var(--text); margin: 0; }
.hs-title p  { font-size: 9.5px; color: #475569; margin: 1px 0 0; }
.h-tip { display: flex; gap: 9px; align-items: flex-start; background: #111827; border: 1px solid #1e293b; border-radius: 9px; padding: 9px 11px; margin-bottom: 5px; }
.h-tip-ic { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-top: 1px; }
.h-tip-txt b { font-size: 10.5px; color: var(--text); display: block; margin-bottom: 2px; }
.h-tip-txt span { font-size: 9.5px; color: var(--muted); line-height: 1.6; display: block; }
.h-steps { display: flex; flex-direction: column; }
.h-step { display: flex; gap: 9px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid #1e293b; }
.h-step:last-child { border-bottom: none; }
.h-step-num { width: 18px; height: 18px; border-radius: 50%; background: rgba(99,102,241,.25); color: #818cf8; font-size: 9.5px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.h-step-txt b { font-size: 10px; color: #cbd5e1; display: block; }
.h-step-txt span { font-size: 9px; color: var(--muted); line-height: 1.6; }
.h-highlight { background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25); border-radius: 9px; padding: 9px 11px; display: flex; gap: 8px; align-items: flex-start; }
.h-highlight i { color: #818cf8; font-size: 12px; margin-top: 1px; flex-shrink: 0; }
.h-highlight p { font-size: 9.5px; color: #94a3b8; line-height: 1.65; margin: 0; }
.help-topic-btn {
  width: 100%; text-align: left; padding: 6px 9px;
  background: transparent; border: none; color: #475569;
  font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 7px;
  display: flex; align-items: center; gap: 8px; transition: background .12s, color .12s;
}
.help-topic-btn i { width: 12px; text-align: center; font-size: 11px; }
.help-topic-btn:hover { background: rgba(255,255,255,.05); color: #cbd5e1; }
.help-topic-btn.active { background: rgba(99,102,241,.18); color: #a5b4fc; }

/* export overlay */
#exportOverlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.85);
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
}
#exportOverlay.on { display: flex; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

</head>

</div><!-- app -->

/* ══════════════════════════════════════
   PANEL TOGGLE
══════════════════════════════════════ */
function togglePanel(key, btn) {
  const drawer = $('panelDrawer');
  const canvasZone = $('canvasZone');

  if (_currentPanel === key) {
    closePanel();
    return;
  }
  _currentPanel = key;

  // Update header
  const cfg = PANELS[key];
  $('pdIcon').className = 'pd-header-icon ' + cfg.iconCls;
  $('pdIcon').innerHTML = `<i class="fa-solid ${cfg.icon}"></i>`;
  $('pdTitle').textContent = cfg.title;

  // Inject content
  $('pdBody').innerHTML = cfg.html();

  // Open drawer
  drawer.classList.add('open');
  canvasZone.classList.add('panel-open');

  // Nav active
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  // Post-render
  setTimeout(() => {
    if (key === 'persons') renderPersons();
    if (key === 'photo') {
      // re-bind bgImgInput
      const inp = $('bgImgInput');
      // already in layout panel, not photo
    }
  }, 0);
}

function closePanel() {
  _currentPanel = null;
  $('panelDrawer').classList.remove('open');
  $('canvasZone').classList.remove('panel-open');
  document.querySelectorAll('.bn-btn').forEach(b => b.classList.remove('active'));
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
const card = $('card');

function setLayout(mode, btn) {
  _layout = mode;
  card.className = 'card-inner' + (mode === 'photo-left' ? '' : ' ' + mode);
  document.querySelectorAll('.lb').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const pp = $('photoPanel');
  if (mode === 'photo-top' || mode === 'photo-bottom') {
    pp.style.width = '100%'; pp.style.height = '55%';
  } else {
    pp.style.height = '';
    pp.style.width = _photoW + '%';
  }
  if (imgLoaded) setTimeout(fitCover, 50);
  updateNameBarRadius();
}

function setPhotoW(v) {
  _photoW = parseInt(v);
  if (_layout !== 'photo-top' && _layout !== 'photo-bottom') $('photoPanel').style.width = v + '%';
  const el = $('photoWVal'); if (el) el.textContent = v + '%';
}
function setCardR(v) { _cardR = parseInt(v); card.style.borderRadius = v + 'px'; const el = $('cardRVal'); if (el) el.textContent = v + 'px'; }
function setBarR(v) {
  _barR = parseInt(v);
  document.documentElement.style.setProperty('--bar-r', v + 'px');
  $('nameBar').style.borderRadius = '';
  updateNameBarRadius();
  const el = $('barRVal'); if (el) el.textContent = v + 'px';
}

function setNamePos(pos, btn) {

(function tryBg() {

function applyFilters() {
  const img=$('photoImg');

  if(br){fs.br=parseInt(br.value);const v=$('brVal');if(v)v.textContent=fs.br;}

  if(op){fs.op=parseInt(op.value);const v=$('imgOpVal');if(v)v.textContent=fs.op+'%';}
  img.style.filter=`brightness(${fs.br}%) contrast(${fs.ct}%) saturate(${fs.sat}%) blur(${fs.blur}px)`;
  img.style.opacity=fs.op/100;
}
function applyTint() {

function applyPreset(t){
  const p={normal:{br:100,ct:100,sat:100,blur:0},bw:{br:100,ct:110,sat:0,blur:0},
    sepia:{br:105,ct:100,sat:50,blur:0},vivid:{br:110,ct:120,sat:160,blur:0},
    dark:{br:65,ct:110,sat:90,blur:0},soft:{br:110,ct:85,sat:80,blur:1.5}}[t];

/* ══════════════════════════════════════
   PHOTO PAN / ZOOM
══════════════════════════════════════ */
const panel=$('photoPanel'), photoImg=$('photoImg'), fileInp=$('fileInput');
let imgLoaded=false,photoBase64=null,scale=1,ox=0,oy=0,flipH=false,flipV=false;
let dragging=false,sx=0,sy=0,sox=0,soy=0;

function applyTransform(){
  const sw=flipH?-scale:scale,sh=flipV?-scale:scale;
  const tx2=flipH?photoImg.naturalWidth*scale:0,ty2=flipV?photoImg.naturalHeight*scale:0;
  photoImg.style.transform=`translate(${ox+tx2}px,${oy+ty2}px) scale(${sw},${sh})`;
}
function fitCover(){
  const pw=panel.offsetWidth,ph=panel.offsetHeight;
  scale=Math.max(pw/photoImg.naturalWidth,ph/photoImg.naturalHeight);
  ox=(pw-photoImg.naturalWidth*scale)/2; oy=(ph-photoImg.naturalHeight*scale)/2;
  applyTransform();
}
function zoomAt(cx,cy,d){
  const ns=Math.min(Math.max(scale+d,.1),10);
  const ix=(cx-ox)/scale,iy=(cy-oy)/scale;
  scale=ns; ox=cx-ix*scale; oy=cy-iy*scale; applyTransform();
}
function loadFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const r=new FileReader();
  r.onload=ev=>{
    photoBase64=ev.target.result;
    photoImg.onload=()=>{
      photoImg.style.display='block'; imgLoaded=true;
      panel.classList.remove('empty'); panel.classList.add('has-img'); fitCover();
    };
    photoImg.src=photoBase64;
  };
  r.readAsDataURL(file);
}
fileInp.addEventListener('change',e=>{ loadFile(e.target.files[0]); fileInp.value=''; });
panel.addEventListener('click',e=>{
  if(dragging) return;
  if(e.target.closest('.photo-controls')) return;
  if(!imgLoaded) fileInp.click();
});
panel.addEventListener('dragover',e=>{e.preventDefault();panel.classList.add('drag-over');});
panel.addEventListener('dragleave',()=>panel.classList.remove('drag-over'));
panel.addEventListener('drop',e=>{e.preventDefault();panel.classList.remove('drag-over');loadFile(e.dataTransfer.files[0]);});
panel.addEventListener('mousedown',e=>{
  if(!imgLoaded||e.target.closest('.photo-controls')) return;
  dragging=false; sx=e.clientX; sy=e.clientY; sox=ox; soy=oy;
  panel.classList.add('grabbing');
  const mv=ev=>{ const dx=ev.clientX-sx,dy=ev.clientY-sy; if(Math.abs(dx)+Math.abs(dy)>3) dragging=true; ox=sox+dx; oy=soy+dy; applyTransform(); };
  const up=()=>{ panel.classList.remove('grabbing'); window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); setTimeout(()=>{dragging=false;},0); };
  window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up); e.preventDefault();
});

// Touch
let tSX=0,tSY=0,tSOX=0,tSOY=0,tDrag=false,lastPinch=0;
panel.addEventListener('touchstart',e=>{
  if(e.touches.length===2){ lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); return; }
  if(!imgLoaded||e.target.closest('.photo-controls')) return;
  const t=e.touches[0]; tSX=t.clientX; tSY=t.clientY; tSOX=ox; tSOY=oy; tDrag=false;
},{passive:true});
panel.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&imgLoaded){
    e.preventDefault();
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const delta=(dist-lastPinch)*.012;
    const r=panel.getBoundingClientRect();
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    zoomAt(cx,cy,delta); lastPinch=dist; return;
  }
  if(!imgLoaded) return;
  const t=e.touches[0]; const dx=t.clientX-tSX,dy=t.clientY-tSY;
  if(Math.abs(dx)+Math.abs(dy)>3) tDrag=true;
  ox=tSOX+dx; oy=tSOY+dy; applyTransform(); e.preventDefault();
},{passive:false});
panel.addEventListener('touchend',e=>{ if(!tDrag&&!imgLoaded) fileInp.click(); tDrag=false; });

panel.addEventListener('wheel',e=>{
  if(!imgLoaded) return; e.preventDefault();
  const r=panel.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?.1:-.1);
},{passive:false});

$('btnZoomIn').addEventListener('click',e=>{e.stopPropagation();zoomAt(panel.offsetWidth/2,panel.offsetHeight/2,.15);});
$('btnZoomOut').addEventListener('click',e=>{e.stopPropagation();zoomAt(panel.offsetWidth/2,panel.offsetHeight/2,-.15);});
$('btnFlipH').addEventListener('click',e=>{e.stopPropagation();flipH=!flipH;e.currentTarget.classList.toggle('active');applyTransform();});
$('btnFlipV').addEventListener('click',e=>{e.stopPropagation();flipV=!flipV;e.currentTarget.classList.toggle('active');applyTransform();});
$('btnReset').addEventListener('click',e=>{e.stopPropagation();flipH=flipV=false;$('btnFlipH').classList.remove('active');$('btnFlipV').classList.remove('active');fitCover();});

const RATIOS={'1920x1080':'16/9','3840x2160':'16/9','1280x720':'16/9','1080x1080':'1/1','1080x1920':'9/16','custom':'16/9'};
function onResChange(v){
  _res=v;
  const cr=$('customRow'); if(cr) cr.style.display=v==='custom'?'flex':'none';
  const ratio = RATIOS[v] || '16/9';
  const frame = $('bgFrame'), cardAsp = $('cardAspect');
  // Set aspect-ratio via CSS
  frame.style.aspectRatio = ratio.replace('/','/');
  if (cardAsp) cardAsp.style.aspectRatio = ratio.replace('/','/');
  // Remove old ratio classes
  ['ratio-square','ratio-portrait'].forEach(c => { frame.classList.remove(c); if(cardAsp) cardAsp.classList.remove(c); });
  if(ratio==='1/1'){ frame.classList.add('ratio-square'); if(cardAsp) cardAsp.classList.add('ratio-square'); }
  if(ratio==='9/16'){ frame.classList.add('ratio-portrait'); if(cardAsp) cardAsp.classList.add('ratio-portrait'); }
  if(imgLoaded) setTimeout(fitCover,50);
}

const PKEY='grafik_persons_v3';

function renderPersons(){
  const el=$('personList'); if(!el) return;
  const all=loadPersons();
  const q=(($('rpSearch')&&$('rpSearch').value)||'').toLowerCase().trim();
  const list=q?all.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.title1||'').toLowerCase().includes(q)||(p.title2||'').toLowerCase().includes(q)):all;
  if(!list.length){
    el.innerHTML=all.length===0
      ?'<div class="rp-empty"><i class="fa-solid fa-users" style="font-size:26px;color:#334155;display:block;margin-bottom:8px;"></i>Henüz kayıt yok.</div>'
      :'<div class="rp-empty">Arama sonucu bulunamadı.</div>';
    return;
  }
  el.innerHTML=list.map(p=>{
    const ini=(p.name||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    const t1=p.title1||'',t2=p.title2||'',id=p.id;
    const trow=(lbl,title)=>title
      ?`<div class="pk-title-row" onclick="event.stopPropagation();loadPersonTitle('${encodeURIComponent(p.name)}','${encodeURIComponent(title)}')">
          <span class="pt-badge">${lbl}</span><span class="pt-text">${title}</span>
          <button class="pt-load" onclick="event.stopPropagation();loadPersonTitle('${encodeURIComponent(p.name)}','${encodeURIComponent(title)}')"><i class="fa-solid fa-arrow-up-right-from-square"></i></button>
        </div>`
      :`<div class="pk-title-row pk-title-empty"><span class="pt-badge">${lbl}</span><span class="pt-text-empty">boş</span>
          <button class="pt-load pt-load-add" onclick="event.stopPropagation();openEditModal(${id})"><i class="fa-solid fa-plus"></i></button>
        </div>`;
    const def=t1||t2||'';
    return `<div class="pk">
      <div class="pk-top" onclick="loadPersonTitle('${encodeURIComponent(p.name)}','${encodeURIComponent(def)}')">
        <div class="pk-avatar">${ini||'?'}</div>
        <div class="pk-name-wrap"><div class="pk-name">${p.name}</div><div class="pk-meta">${[t1,t2].filter(Boolean).length} ünvan</div></div>
        <div class="pk-actions">
          <button class="pk-ico pk-ico-edit" onclick="event.stopPropagation();openEditModal(${id})"><i class="fa-solid fa-pen"></i></button>
          <button class="pk-ico pk-ico-del" onclick="event.stopPropagation();deletePerson(${id})"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
      <div class="pk-titles">${trow('Ü1',t1)}${trow('Ü2',t2)}</div>
    </div>`;
  }).join('');
}

function loadPersonTitle(nameEnc, titleEnc) {
  const name=decodeURIComponent(nameEnc), title=decodeURIComponent(titleEnc);

  [$('nameField'),$('titleField')].forEach(el=>{
    el.style.transition='background .3s'; el.style.background='rgba(99,102,241,.3)';

function deletePerson(id){ if(!confirm('Silmek istiyor musunuz?')) return; savePersons(loadPersons().filter(p=>p.id!==id)); renderPersons(); }

function openAddModal(){
  _editId=null; $('pkModalTitle').textContent='Yeni Kişi Ekle';

  $('pkModalT1').value=($('titleField').textContent||'').trim();

function openEditModal(id){
  const p=loadPersons().find(x=>x.id===id); if(!p) return;
  _editId=id; $('pkModalTitle').textContent='Kaydı Düzenle';
  $('pkModalName').value=p.name||''; $('pkModalT1').value=p.title1||''; $('pkModalT2').value=p.title2||'';

}
function showModal(){
  const m=$('pkModal'); m.style.display='flex';
  setTimeout(()=>$('pkModalName').focus(),80);
  m.onclick=e=>{if(e.target===m)closeModal();};
  ['pkModalName','pkModalT1','pkModalT2'].forEach(id=>{const el=$(id);if(el)el.onkeydown=e=>{if(e.key==='Enter')submitModal();};});
}
function closeModal(){ $('pkModal').style.display='none'; _editId=null; }
function submitModal(){
  const name=($('pkModalName').value||'').trim();
  const t1=($('pkModalT1').value||'').trim();
  const t2=($('pkModalT2').value||'').trim();
  if(!name){$('pkModalName').style.borderColor='#ef4444';$('pkModalName').focus();return;}
  $('pkModalName').style.borderColor='';
  const list=loadPersons();
  if(_editId!==null){ const i=list.findIndex(p=>p.id===_editId); if(i>=0){list[i].name=name;list[i].title1=t1;list[i].title2=t2;} }
  else list.unshift({id:Date.now(),name,title1:t1,title2:t2});
  savePersons(list); closeModal(); renderPersons();
}

function exportPersonsXLSX(){

  const wb=XLSX.utils.book_new(); const ws=XLSX.utils.aoa_to_sheet(rows);

function importPersonsXLSX(inp){
  const file=inp.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'}); const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const first=((rows[0]&&rows[0][0])||'').toString().toLowerCase();
      const start=(first.includes('ad')||first.includes('name'))?1:0;
      let added=0; const list=loadPersons();
      rows.slice(start).forEach(r=>{
        const name=(r[0]||'').toString().trim(); if(!name) return;
        if(list.some(p=>p.name===name)) return;
        list.push({id:Date.now()+Math.random()*1000,name,title1:(r[1]||'').toString().trim(),title2:(r[2]||'').toString().trim()}); added++;
      });
      savePersons(list); renderPersons(); alert(`✓ ${added} kayıt eklendi.`);
    }catch(err){alert('Hata:\n'+err.message);}
    inp.value='';
  };
  r.readAsBinaryString(file);
}

   EXPORT — pure Canvas API (taint-free)
══════════════════════════════════════ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function exportImg() {
  const defName = 'grafik_export';
  const userInput = await promptExportName(defName);
  if (userInput === null) return;
  const fileName = (userInput.trim() || defName).replace(/[^a-zA-Z0-9_\-ğüşıöçĞÜŞİÖÇ ]/g, '_');

  $('exportOverlay').classList.add('on');
  await sleep(80);

  try {
    let W, H;
    if (_res === 'custom') {
      const cw = $('cusW'), ch = $('cusH');
      W = parseInt((cw ? cw.value : null) || _cusW) || 1920;
      H = parseInt((ch ? ch.value : null) || _cusH) || 1080;
    } else {
      [W, H] = _res.split('x').map(Number);
    }

    const mime    = _fmt === 'png' ? 'image/png' : _fmt === 'webp' ? 'image/webp' : 'image/jpeg';
    const ext     = _fmt === 'png' ? 'png'       : _fmt === 'webp' ? 'webp'       : 'jpg';
    const quality = _quality / 100;

    // ── ölçek hesapla ──
    const frame    = $('bgFrame');
    const cardEl   = $('card');
    const frameR   = frame.getBoundingClientRect();
    const cardR    = cardEl.getBoundingClientRect();

    const scX = W / frameR.width;
    const scY = H / frameR.height;

    // kart koordinatları (frame içinde relative)
    const cx = (cardR.left - frameR.left) * scX;
    const cy = (cardR.top  - frameR.top)  * scY;
    const cw = cardR.width  * scX;
    const ch = cardR.height * scY;

    const canvas = document.createElement('canvas');
    canvas.width  = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // 1) ARKA PLAN GRADYENİ
    const cp = $('contentPanel');
    const bgStyle = cp.style.background || `linear-gradient(135deg,${cl.bgC1},${cl.bgC2})`;
    const grad = parseGradientForCanvas(ctx, bgStyle, W, H);
    if (grad) { ctx.fillStyle = grad; } else { ctx.fillStyle = bgStyle; }
    ctx.fillRect(0, 0, W, H);

    // 2) ARKA PLAN RESMİ
    if (bgBase64) {
      await drawImageContained(ctx, bgBase64, 0, 0, W, H, _bgFit, _bgOp / 100);
    }

    // 3) KART köşe yuvarlaması ile clip
    const r = _cardR * Math.min(scX, scY);
    roundRect(ctx, cx, cy, cw, ch, r);
    ctx.save();
    ctx.clip();

    // 4) FOTOĞRAF PANELİ
    const photoPanelEl = $('photoPanel');
    const photoPanelR  = photoPanelEl.getBoundingClientRect();
    const px = (photoPanelR.left - frameR.left) * scX;
    const py = (photoPanelR.top  - frameR.top)  * scY;
    const pw = photoPanelR.width  * scX;
    const ph = photoPanelR.height * scY;

    // foto arka plan rengi
    ctx.fillStyle = cl.photoBg || '#1a1a2e';
    ctx.fillRect(px, py, pw, ph);

    if (imgLoaded && photoBase64) {
      const img = await loadImg(photoBase64);
      // transform: translate + scale (flip)
      ctx.save();
      ctx.rect(px, py, pw, ph); ctx.clip(); // photo panel sınırı
      const scaleImg = scale * Math.min(scX, scY);
      const imgOx = px + ox * scX;
      const imgOy = py + oy * scY;
      const sw = flipH ? -scaleImg : scaleImg;
      const sh = flipV ? -scaleImg : scaleImg;
      ctx.save();
      ctx.translate(imgOx + (flipH ? img.naturalWidth * scaleImg : 0),
                    imgOy + (flipV ? img.naturalHeight * scaleImg : 0));
      ctx.scale(sw, sh);
      // filters
      ctx.filter = `brightness(${fs.br}%) contrast(${fs.ct}%) saturate(${fs.sat}%) blur(${fs.blur * Math.min(scX,scY)}px)`;
      ctx.globalAlpha = fs.op / 100;
      ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);
      ctx.restore();
      // tint
      if (ts.amount > 0) {
        ctx.globalAlpha = ts.amount / 100;
        ctx.fillStyle = ts.color;
        ctx.fillRect(px, py, pw, ph);
      }
      ctx.restore();
    }

    // 5) CONTENT PANEL arka planı
    const cpR = $('contentPanel').getBoundingClientRect();
    const cpx = (cpR.left - frameR.left) * scX;
    const cpy = (cpR.top  - frameR.top)  * scY;
    const cpw = cpR.width  * scX;
    const cph = cpR.height * scY;

    ctx.globalAlpha = 1; ctx.filter = 'none';
    const cpGrad = parseGradientForCanvas(ctx, cp.style.background, cpw, cph, cpx, cpy);
    ctx.fillStyle = cpGrad || cp.style.background || '#1e3a5f';
    ctx.fillRect(cpx, cpy, cpw, cph);

    // yazı zemini (quoteBg)
    if (cl.quoteBgOp > 0) {
      const qbEl = $('quoteBg');
      const qbR  = qbEl.getBoundingClientRect();
      const qbx = (qbR.left - frameR.left) * scX;
      const qby = (qbR.top  - frameR.top)  * scY;
      const qbw = qbR.width  * scX;
      const qbh = qbR.height * scY;
      ctx.globalAlpha = cl.quoteBgOp / 100;
      ctx.fillStyle   = cl.quoteBgColor;
      ctx.fillRect(qbx, qby, qbw, qbh);
      ctx.globalAlpha = 1;
    }

    // 6) NAME BAR
    if (_showNameBar) {
      const nbWrap = $('nameBarWrap');
      const nbEl   = $('nameBar');
      const nbR    = nbEl.getBoundingClientRect();
      const nbx = (nbR.left - frameR.left) * scX;
      const nby = (nbR.top  - frameR.top)  * scY;
      const nbw = nbR.width  * scX;
      const nbh = nbR.height * scY;
      const barR2 = _barR * Math.min(scX, scY);

      // bar bg
      const bbEl = $('barBg');
      let barBgStyle = cl.barSolid ? cl.barSolidColor : `linear-gradient(${cl.barAngle}deg,${cl.barC1},${cl.barC2})`;
      ctx.globalAlpha = cl.barOp / 100;
      const barGrad = parseGradientForCanvas(ctx, barBgStyle, nbw, nbh, nbx, nby);
      ctx.fillStyle = barGrad || barBgStyle;
      // radius matches position
      const brm = { 'bottom-left':'0 '+barR2+' 0 0','bottom-right':barR2+' 0 0 0','top-left':'0 0 '+barR2+' 0','top-right':'0 0 0 '+barR2 };
      const brArr = (brm[_namePos]||'0').split(' ').map(Number);
      roundRect(ctx, nbx, nby, nbw, nbh, brArr);
      ctx.fill();
      ctx.globalAlpha = 1;

      // name text
      const ratio = Math.min(scX, scY);
      const nf = $('nameField');
      const tf = $('titleField');
      const nfR = nf.getBoundingClientRect();
      const tfR = tf.getBoundingClientRect();

      ctx.fillStyle = tx.nColor;
      ctx.font = `${tx.nW} ${tx.nSz * ratio}px ${tx.nFont.replace(/'/g,'')}`;
      ctx.textBaseline = 'top';
      ctx.letterSpacing = (tx.nLS * ratio) + 'px';
      const nfx = (nfR.left - frameR.left) * scX;
      const nfy = (nfR.top  - frameR.top)  * scY;
      wrapText(ctx, nf.textContent || '', nfx, nfy, nfR.width * scX, tx.nSz * ratio * 1.4, tx.nW, tx.nFont, tx.nSz * ratio);

      if (_showTitle && tf.style.display !== 'none') {
        ctx.fillStyle = tx.tColor;
        ctx.font = `${tx.tW} ${tx.tSz * ratio}px ${tx.tFont.replace(/'/g,'')}`;
        ctx.letterSpacing = '0px';
        const tfx = (tfR.left - frameR.left) * scX;
        const tfy = (tfR.top  - frameR.top)  * scY;
        wrapText(ctx, tf.textContent || '', tfx, tfy, tfR.width * scX, tx.tSz * ratio * 1.4, tx.tW, tx.tFont, tx.tSz * ratio);
      }
    }

    // 7) QUOTE TEXT
    const qtEl = $('quoteText');
    const qtR  = qtEl.getBoundingClientRect();
    const ratio2 = Math.min(scX, scY);
    const qtx = (qtR.left - frameR.left) * scX;
    const qty = (qtR.top  - frameR.top)  * scY;
    ctx.globalAlpha = 1;
    ctx.fillStyle   = tx.qColor;
    ctx.font = `${tx.qW} ${tx.qSz * ratio2}px ${tx.qFont.replace(/'/g,'')}`;
    ctx.letterSpacing = (tx.qLS * ratio2) + 'px';
    ctx.textBaseline = 'top';
    wrapText(ctx, qtEl.textContent || '', qtx, qty, qtR.width * scX, tx.qSz * ratio2 * tx.qLH, tx.qW, tx.qFont, tx.qSz * ratio2);

    ctx.restore(); // kart clip sonu

    // 8) indir
    canvas.toBlob(blob => {
      downloadBlob(blob, `${fileName}.${ext}`);
      $('exportOverlay').classList.remove('on');
    }, mime, quality);

  } catch(err) {
    console.error(err);
    alert('Export hatası:\n' + err.message);
    $('exportOverlay').classList.remove('on');
  }
}

/* ── Canvas yardımcıları ── */
function loadImg(src) {
  return new Promise((res, rej) => {
    const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src;
  });
}

async function drawImageContained(ctx, src, x, y, w, h, fit, alpha) {
  const img = await loadImg(src);
  ctx.save();
  ctx.globalAlpha = alpha;
  if (fit === 'contain') {
    const s = Math.min(w / img.naturalWidth, h / img.naturalHeight);
    const dx = x + (w - img.naturalWidth * s) / 2;
    const dy = y + (h - img.naturalHeight * s) / 2;
    ctx.drawImage(img, dx, dy, img.naturalWidth * s, img.naturalHeight * s);
  } else if (fit === 'fill') {
    ctx.drawImage(img, x, y, w, h);
  } else { // cover
    const s = Math.max(w / img.naturalWidth, h / img.naturalHeight);
    const dx = x + (w - img.naturalWidth * s) / 2;
    const dy = y + (h - img.naturalHeight * s) / 2;
    ctx.drawImage(img, dx, dy, img.naturalWidth * s, img.naturalHeight * s);
  }
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  const radii = Array.isArray(r) ? r : [r, r, r, r];
  ctx.beginPath();
  ctx.moveTo(x + radii[0], y);
  ctx.lineTo(x + w - radii[1], y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radii[1]);
  ctx.lineTo(x + w, y + h - radii[2]);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radii[2], y + h);
  ctx.lineTo(x + radii[3], y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radii[3]);
  ctx.lineTo(x, y + radii[0]);
  ctx.quadraticCurveTo(x, y, x + radii[0], y);
  ctx.closePath();
}

function parseGradientForCanvas(ctx, css, w, h, ox2 = 0, oy2 = 0) {
  if (!css) return null;
  const m = css.match(/linear-gradient\((\d+)deg,\s*(#[a-fA-F0-9]+|rgba?\([^)]+\)|[a-z]+),\s*(#[a-fA-F0-9]+|rgba?\([^)]+\)|[a-z]+)\)/);
  if (!m) return null;
  const deg = parseFloat(m[1]);
  const rad = (deg - 90) * Math.PI / 180;
  const gx1 = ox2 + w / 2 - Math.cos(rad) * w / 2;
  const gy1 = oy2 + h / 2 - Math.sin(rad) * h / 2;
  const gx2 = ox2 + w / 2 + Math.cos(rad) * w / 2;
  const gy2 = oy2 + h / 2 + Math.sin(rad) * h / 2;
  const g = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
  g.addColorStop(0, m[2]); g.addColorStop(1, m[3]);
  return g;
}

function wrapText(ctx, text, x, y, maxW, lineH, fw, ff, sz) {
  if (!text) return;
  const lines = text.split('\n');
  let curY = y;
  for (const line of lines) {
    const words = line.split(' ');
    let cur = '';
    for (const w of words) {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && cur) {
        ctx.fillText(cur, x, curY); curY += lineH; cur = w;
      } else { cur = test; }
    }
    if (cur) { ctx.fillText(cur, x, curY); curY += lineH; }
  }
}

function promptExportName(def){
  return new Promise(resolve=>{
    const old=$('exportNameModal'); if(old) old.remove();
    const m=document.createElement('div'); m.id='exportNameModal';
    m.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';
    m.innerHTML=`<div style="background:#1e293b;border:1px solid #334155;border-radius:14px;width:360px;max-width:94vw;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;align-items:center;gap:10px;"><i class="fa-solid fa-file-image" style="color:#22c55e;font-size:15px;"></i>
        <span style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1;">Görsel Adı</span>
        <button id="enClose" style="background:none;border:none;color:#64748b;font-size:16px;cursor:pointer;padding:2px 6px;">✕</button></div>
      <div><label style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;">Dosya adı (opsiyonel)</label>
        <input id="enInput" type="text" placeholder="${def}" value="${def}" style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:8px;padding:8px 11px;font-size:12.5px;outline:none;font-family:inherit;box-sizing:border-box;"></div>
      <div style="display:flex;gap:8px;">
        <button id="enCancel" style="flex:1;padding:8px;border-radius:8px;border:none;background:#334155;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;">İptal</button>
        <button id="enOk" style="flex:2;padding:8px;border-radius:8px;border:none;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;"><i class="fa-solid fa-download"></i> İndir</button>
      </div></div>`;
    document.body.appendChild(m);
    const inp=$('enInput'); setTimeout(()=>{inp.select();inp.focus();},80);
    const ok=()=>{const v=inp.value;m.remove();resolve(v);};
    const cancel=()=>{m.remove();resolve(null);};
    $('enOk').onclick=ok; $('enCancel').onclick=cancel; $('enClose').onclick=cancel;
    m.onclick=e=>{if(e.target===m)cancel();};
    inp.onkeydown=e=>{if(e.key==='Enter')ok();if(e.key==='Escape')cancel();};
  });
}

function downloadBlob(blob,name){
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);
}
